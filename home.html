<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="description" content="Ionic Post is a modern post production house — editorial, color, and finishing.">
    <link rel="canonical" href="https://ionicpost.co/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ionic Post</title>
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-IONICPLACEHLDR"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-IONICPLACEHLDR');
    </script>
    <meta property="og:title" content="ionic post">
    <meta property="og:description" content="modern post production house — editorial, color, and finishing.">
    <meta property="og:image" content="https://ionicpost.co/assets/images/og-image.png">
    <meta property="og:url" content="https://ionicpost.co">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://player.vimeo.com">
    <link rel="preconnect" href="https://i.vimeocdn.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Satoshi';
            src: url('/assets/fonts/Satoshi-Variable.ttf') format('truetype');
            font-weight: 300 900;
            font-display: swap;
        }

        :root {
            --ice: #FAFBFC;
            --bond-blue: #5979e9;
            --black: #0A0A0A;
            --gray: #6B7280;
            --white: #FFFFFF;
            --purple: #7c5cfc;
            --space-dark: #1A1A2E;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        a, button, label { outline: none; }

        ::selection {
            background: var(--black);
            color: var(--white);
            -webkit-text-fill-color: var(--white);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--white);
            color: var(--black);
            letter-spacing: -0.07em;
            overflow-x: hidden;
        }

        /* ===== Custom cursor ===== */
        .cursor {
            position: fixed;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--white);
            pointer-events: none;
            z-index: 99999;
            mix-blend-mode: difference;
            left: 0; top: 0;
            will-change: transform;
        }
        @media (pointer: coarse) { .cursor { display: none; } }

        /* ===== Nav / plus menu ===== */
        .nav { position: fixed; top: 0; right: 0; padding: 2rem; z-index: 10001; }
        .menu-toggle {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .menu-toggle.active { transform: rotate(45deg); }
        .plus-icon { width: 18px; height: 18px; position: relative; }
        .plus-icon span {
            display: block; position: absolute; width: 100%; height: 2px;
            background: var(--black); top: 50%; left: 0; transition: all 0.3s ease;
        }
        .plus-icon span:first-child { transform: translateY(-50%) rotate(90deg); }
        .plus-icon span:last-child  { transform: translateY(-50%); }

        .menu-overlay {
            position: fixed; inset: 0; z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: flex-end; padding: 3rem;
            pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
        }
        .menu-overlay.active {
            pointer-events: auto; opacity: 1;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.3);
        }
        .menu-links { display: flex; flex-direction: column; align-items: flex-end; gap: 0; }
        .menu-link {
            font-size: clamp(3.5rem, 8vw, 7rem); font-weight: 500; color: var(--black);
            text-decoration: none; opacity: 0; transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            letter-spacing: -0.07em; line-height: 1.05;
        }
        .menu-overlay.active .menu-link { opacity: 0.6; transform: translateX(0); }
        .menu-overlay.active .menu-link:nth-child(1) { transition-delay: 0.05s; }
        .menu-overlay.active .menu-link:nth-child(2) { transition-delay: 0.10s; }
        .menu-overlay.active .menu-link:nth-child(3) { transition-delay: 0.15s; }
        .menu-link:hover { opacity: 1 !important; }
        .menu-socials {
            display: flex; align-items: center; gap: 1.2rem; margin-top: 1.5rem;
            opacity: 0; transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .menu-overlay.active .menu-socials { opacity: 0.5; transform: translateX(0); transition-delay: 0.3s; }
        .social-link { color: var(--black); display: inline-flex; transition: color 0.2s ease; }

        /* ===== Top-left logomark ===== */
        .logo-bottom { position: fixed; top: 2rem; left: 2rem; z-index: 10001; background: none; border: none; transition: opacity 0.3s ease; }
        .logo-bottom:hover { opacity: 0.7; }
        .logo-bottom svg { width: 40px; height: 40px; display: block; }

        /* ===== Hero ===== */
        .hero-section {
            position: relative; width: 100vw; height: 100vh; height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: var(--white);
        }
        .hero-video {
            position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
        }
        .hero-video iframe {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.78vh;
            transform: translate(-50%, -50%); border: 0;
        }
        .hero-wordmark {
            position: relative; z-index: 2; width: 37.5vw; max-width: 350px; height: auto;
            user-select: none; -webkit-user-drag: none; pointer-events: none;
        }
        .scroll-cue {
            position: absolute; bottom: 2.2rem; left: 50%; transform: translateX(-50%);
            z-index: 2; font-size: 0.7rem; letter-spacing: 0.04em; color: rgba(255,255,255,0.85);
            text-transform: lowercase; opacity: 0.85; animation: cueBob 2.4s ease-in-out infinite;
        }
        @keyframes cueBob { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(6px); } }

        /* ===== Work grid ===== */
        .work-section { padding: 8vh 4vw 12vh; background: var(--white); }
        .work-eyebrow {
            font-size: 0.78rem; letter-spacing: 0.02em; text-transform: lowercase;
            color: var(--gray); margin-bottom: 2.2rem; padding-left: 0.2rem;
        }
        .work-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.4vw;
            max-width: 1500px; margin: 0 auto;
        }
        .work-card {
            position: relative; aspect-ratio: 16 / 9; overflow: hidden;
            background: #0d0d0d; border-radius: 4px;
        }
        .work-card .card-thumb {
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;
        }
        .work-card iframe {
            position: absolute; top: 50%; left: 50%;
            width: 100%; height: 56.25vw; min-height: 100%; min-width: 177.78%;
            transform: translate(-50%, -50%); border: 0; z-index: 2;
            opacity: 0; transition: opacity 0.6s ease;
            pointer-events: none; /* let the custom cursor keep tracking over the player */
        }
        .work-card.playing iframe { opacity: 1; }
        .work-card .card-scrim {
            position: absolute; inset: 0; z-index: 2; pointer-events: none;
            background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0) 55%);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .work-card:hover .card-scrim, .work-card.playing .card-scrim { opacity: 1; }
        .work-card .card-label {
            position: absolute; left: 1.5rem; bottom: 1.4rem; z-index: 3;
            font-size: clamp(1.05rem, 2.1vw, 1.5rem); font-weight: 400; letter-spacing: -0.04em;
            line-height: 1.05; text-transform: lowercase; color: var(--white);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .work-card:hover .card-label, .work-card.playing .card-label { opacity: 1; }
        body.dark-mode .work-card .card-label { color: var(--purple); -webkit-text-fill-color: var(--purple); }
        @media (max-width: 768px) { .work-card .card-label { left: 1rem; bottom: 1rem; } }
        @media (max-width: 768px) {
            .work-grid { grid-template-columns: 1fr; gap: 3vw; }
            .work-section { padding: 6vh 5vw 10vh; }
        }

        /* ===== Footer ===== */
        .site-footer {
            position: relative; display: flex; align-items: center; justify-content: space-between;
            padding: 1.5rem 2rem; background: var(--white); z-index: 50;
        }
        .site-footer-left { font-size: 0.8rem; color: var(--black); }
        .footer-link { color: var(--black); text-decoration: none; opacity: 0.7; }
        .footer-link:hover { opacity: 1; }
        .site-footer-socials { display: flex; align-items: center; gap: 1rem; }
        .dark-mode-toggle { position: relative; display: inline-block; width: 34px; height: 18px; }
        .dark-mode-toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-track {
            position: absolute; inset: 0; background: #d0d0d0; border-radius: 20px; transition: background 0.3s ease;
        }
        .toggle-track::before {
            content: ''; position: absolute; width: 14px; height: 14px; left: 2px; top: 2px;
            background: #fff; border-radius: 50%; transition: transform 0.3s ease;
        }
        .dark-mode-toggle input:checked + .toggle-track { background: var(--purple); }
        .dark-mode-toggle input:checked + .toggle-track::before { transform: translateX(16px); }

        /* ===== Dark mode ===== */
        body.dark-mode { background-color: var(--space-dark); color: var(--purple); }
        body.dark-mode .hero-section,
        body.dark-mode .work-section,
        body.dark-mode .site-footer { background: var(--space-dark); }
        body.dark-mode .plus-icon span { background: var(--purple); }
        body.dark-mode .menu-link,
        body.dark-mode .social-link,
        body.dark-mode .site-footer-left,
        body.dark-mode .footer-link { color: var(--purple); -webkit-text-fill-color: var(--purple); }
        body.dark-mode .logo-bottom svg path { fill: var(--purple) !important; }
        body.dark-mode .cursor { background: var(--purple); }
        body.dark-mode ::selection { background: var(--purple); color: var(--space-dark); -webkit-text-fill-color: var(--space-dark); }
        body.dark-mode .menu-overlay.active { background: rgba(26,26,46,0.4); }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>

    <!-- Nav -->
    <nav class="nav">
        <div class="menu-toggle" id="menuToggle" data-cursor="menu">
            <div class="plus-icon"><span></span><span></span></div>
        </div>
    </nav>

    <!-- Menu overlay -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-links">
            <a href="/editors" class="menu-link">editors</a>
            <a href="/about" class="menu-link">about</a>
            <a href="/contact" class="menu-link">contact</a>
        </div>
        <div class="menu-socials">
            <a href="https://www.instagram.com/ionicpost" target="_blank" rel="noopener" class="social-link" aria-label="Instagram">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor"/></svg>
            </a>
            <a href="https://www.linkedin.com/company/ionic-post/" target="_blank" rel="noopener" class="social-link" aria-label="LinkedIn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" stroke="currentColor" stroke-width="2" fill="none"/><rect x="2" y="9" width="4" height="12" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="4" cy="4" r="2" stroke="currentColor" stroke-width="2" fill="none"/></svg>
            </a>
        </div>
    </div>

    <!-- Top-left logomark -->
    <a href="/" class="logo-bottom" data-cursor="home" aria-label="Ionic Post home">
        <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="#0A0A0A" d="M80 18 a22 22 0 1 0 0 44 a22 22 0 1 0 0 -44 z"/><path fill="#0A0A0A" d="M63 72 h34 v78 h-34 z"/>
        </svg>
    </a>

    <!-- Hero: landing reel + wordmark -->
    <section class="hero-section" id="hero">
        <div class="hero-video">
            <iframe src="https://player.vimeo.com/video/1170378022?h=1bb1658087&badge=0&autopause=0&player_id=0&app_id=58479&autoplay=1&loop=1&muted=1&controls=0&background=1&dnt=1&quality=1080p" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
        </div>
        <img src="/assets/logos/brand/ionicpost.png" width="1332" height="396" class="hero-wordmark" alt="Ionic Post">
        <span class="scroll-cue">scroll</span>
    </section>

    <!-- Work: all projects as video players -->
    <section class="work-section">
        <p class="work-eyebrow">selected work</p>
        <div class="work-grid" id="workGrid"></div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="site-footer-left">2026, ionic post&nbsp;&nbsp;·&nbsp;&nbsp;<a href="/privacy" class="footer-link">privacy</a></div>
        <div class="site-footer-socials">
            <label class="dark-mode-toggle">
                <input type="checkbox" id="darkModeToggle">
                <span class="toggle-track"></span>
            </label>
            <a href="https://www.instagram.com/ionicpost" target="_blank" rel="noopener" class="social-link" aria-label="Instagram">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor"/></svg>
            </a>
            <a href="https://www.linkedin.com/company/ionic-post/" target="_blank" rel="noopener" class="social-link" aria-label="LinkedIn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" stroke="currentColor" stroke-width="2" fill="none"/><rect x="2" y="9" width="4" height="12" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="4" cy="4" r="2" stroke="currentColor" stroke-width="2" fill="none"/></svg>
            </a>
        </div>
    </footer>

    <script>
    // ===== Projects (Jacob Frost's reel — placeholder until per-client reels land) =====
    const PROJECTS = [
        { client: 'archer money',   vimeo: '1200282915', hash: 'ffeabc1665', thumbnail: 'https://i.vimeocdn.com/video/2167332209-2e6e17f30b93c08b842d27b71c059107ec92ba441d1f37f630c59ddbab7e6362-d_1280x720' },
        { client: 'onco optima',    vimeo: '1184586128', thumbnail: 'https://i.vimeocdn.com/video/2147773004-bfe04ac45210e7486d3ec60c04f84db2026c53fd35be3f9319ab3f4f770a5d61-d_1280x720' },
        { client: 'wabi',           vimeo: '1161268499', thumbnail: 'https://i.vimeocdn.com/video/2116569980-827a4c9a901fdcce2c94ba3cec07bb31cda14e49b9fc66e30805132417bf6713-d_1280x720' },
        { client: 'pocket',         vimeo: '1170047221', hash: '6ac82c19db', thumbnail: 'https://i.vimeocdn.com/video/2129030620-e34b7e0c8001f6efcbcb482157f38106e4e2d3c1037a7a1a0a6c7c923f294342-d_1280x720' },
        { client: "arc'teryx",      vimeo: '1141586908', thumbnail: 'https://i.vimeocdn.com/video/2089031096-1db55212ce8d60b1ffaa49c54beb793e20934cb93e7df1fd0e2ac6ee80619aeb-d_1280x720' },
        { client: 'pinch',          vimeo: '1140543709', thumbnail: 'https://i.vimeocdn.com/video/2089993227-e000ed9b7ef428ebf6588769ae040780042629649a7118b7c81199783dabe96a-d_1280x720' },
        { client: 'fare',           vimeo: '1175563835', thumbnail: 'https://i.vimeocdn.com/video/2136430771-f53c21717a7bbd356033553598ee8ab44587fc7bfb1f902567c96ef2ccf98eb5-d_1280x720' },
        { client: 'world of hyatt', vimeo: '1149097153', thumbnail: 'https://i.vimeocdn.com/video/2099561094-be2875973c8819d32c4faae7afab7681cb8564188b1271444c1a43dabb5315d5-d_1280x720' }
    ];

    const grid = document.getElementById('workGrid');
    PROJECTS.forEach(function(p) {
        const card = document.createElement('div');
        card.className = 'work-card';
        card.dataset.vimeo = p.vimeo;
        card.dataset.hash = p.hash || '';
        card.innerHTML =
            '<img class="card-thumb" src="' + p.thumbnail + '" width="1280" height="720" alt="' + p.client + '" loading="lazy">' +
            '<div class="card-scrim"></div>' +
            '<span class="card-label">' + p.client + '</span>';
        grid.appendChild(card);
    });

    // Reels play on hover (desktop) — same pattern as the editors roster. Posters
    // stay as the resting state so the grid reads even before anything plays.
    const cards = Array.from(document.querySelectorAll('.work-card'));
    const finePointer = window.matchMedia('(pointer: fine)').matches;

    function loadReel(card) {
        if (card.querySelector('iframe')) { card.classList.add('playing'); return; }
        const v = card.dataset.vimeo, h = card.dataset.hash;
        const iframe = document.createElement('iframe');
        iframe.allow = 'autoplay; fullscreen; picture-in-picture';
        iframe.src = 'https://player.vimeo.com/video/' + v +
            '?' + (h ? 'h=' + h + '&' : '') +
            'badge=0&autopause=0&autoplay=1&loop=1&muted=1&controls=0&background=1&dnt=1&quality=720p';
        card.appendChild(iframe);
        requestAnimationFrame(function(){ card.classList.add('playing'); });
    }

    if (finePointer) {
        cards.forEach(function(card) {
            card.addEventListener('mouseenter', function() { loadReel(card); });
            card.addEventListener('mouseleave', function() {
                card.classList.remove('playing');
                const f = card.querySelector('iframe');
                if (f) f.remove();
            });
        });
    } else {
        // Touch devices: autoplay the reel for whichever card is in view.
        const io = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) loadReel(entry.target);
            });
        }, { threshold: 0.5 });
        cards.forEach(function(c) { io.observe(c); });
    }

    // ===== Menu =====
    const menuToggle = document.getElementById('menuToggle');
    const menuOverlay = document.getElementById('menuOverlay');
    menuToggle.addEventListener('click', function() {
        menuToggle.classList.toggle('active');
        menuOverlay.classList.toggle('active');
    });
    menuOverlay.addEventListener('click', function(e) {
        if (e.target === menuOverlay) { menuToggle.classList.remove('active'); menuOverlay.classList.remove('active'); }
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { menuToggle.classList.remove('active'); menuOverlay.classList.remove('active'); }
    });

    // ===== Custom cursor =====
    const cursor = document.getElementById('cursor');
    let mx = 0, my = 0, cx = 0, cy = 0;
    document.addEventListener('mousemove', function(e) { mx = e.clientX; my = e.clientY; });
    (function loop() {
        cx += (mx - cx) * 0.5; cy += (my - cy) * 0.5;
        cursor.style.transform = 'translate(' + (cx - 5) + 'px,' + (cy - 5) + 'px)';
        requestAnimationFrame(loop);
    })();

    // ===== Dark mode =====
    (function() {
        const toggle = document.getElementById('darkModeToggle');
        if (localStorage.getItem('darkMode') === 'true') { document.body.classList.add('dark-mode'); toggle.checked = true; }
        toggle.addEventListener('change', function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        });
    })();
    </script>
</body>
</html>
