<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="description" content="Ionic Post is a modern post production house — editorial, color, and finishing.">
    <link rel="canonical" href="https://ionicpost.co/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ionic Post</title>
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-IONICPLACEHLDR"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-IONICPLACEHLDR');
    </script>
    <meta property="og:title" content="ionic post">
    <meta property="og:description" content="modern post production house — editorial, color, and finishing.">
    <meta property="og:image" content="https://ionicpost.co/assets/images/og-image.png">
    <meta property="og:url" content="https://ionicpost.co">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://player.vimeo.com">
    <link rel="preconnect" href="https://i.vimeocdn.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Satoshi';
            src: url('/assets/fonts/Satoshi-Variable.ttf') format('truetype');
            font-weight: 300 900;
            font-display: swap;
        }

        :root {
            --ice: #FAFBFC;
            --bond-blue: #5979e9;
            --black: #0A0A0A;
            --gray: #6B7280;
            --white: #FFFFFF;
            --purple: #7c5cfc;
            --space-dark: #1A1A2E;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        a, button, label { outline: none; }

        ::selection {
            background: var(--black);
            color: var(--white);
            -webkit-text-fill-color: var(--white);
        }

        html, body { height: 100%; }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--white);
            color: var(--black);
            letter-spacing: -0.07em;
            overflow: hidden;
        }
        body.dark-mode { background-color: var(--space-dark); }

        /* ===== Custom cursor ===== */
        .cursor {
            position: fixed;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--white);
            pointer-events: none;
            z-index: 10001;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
        }
        @media (pointer: coarse) { .cursor { display: none; } }

        /* ===== Nav / plus menu ===== */
        .nav { position: fixed; top: 0; right: 0; padding: 2rem; z-index: 10001; }
        .menu-toggle {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .menu-toggle.active { transform: rotate(45deg); }
        .plus-icon { width: 18px; height: 18px; position: relative; }
        .plus-icon span {
            display: block; position: absolute; width: 100%; height: 2px;
            background: #7c5cfc; top: 50%; left: 0; transition: all 0.3s ease;
        }
        .plus-icon span:first-child { transform: translateY(-50%) rotate(90deg); }
        .plus-icon span:last-child  { transform: translateY(-50%); }

        .menu-overlay {
            position: fixed; inset: 0; z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: flex-end; padding: 3rem;
            pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
        }
        .menu-overlay.active {
            pointer-events: auto; opacity: 1;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.3);
        }
        .menu-links { display: flex; flex-direction: column; align-items: flex-end; gap: 0; }
        .menu-link {
            font-size: clamp(3.5rem, 8vw, 7rem); font-weight: 500; color: var(--black);
            text-decoration: none; opacity: 0; transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            letter-spacing: -0.07em; line-height: 1.05;
        }
        .menu-overlay.active .menu-link { opacity: 0.6; transform: translateX(0); }
        .menu-overlay.active .menu-link:nth-child(1) { transition-delay: 0.05s; }
        .menu-overlay.active .menu-link:nth-child(2) { transition-delay: 0.10s; }
        .menu-overlay.active .menu-link:nth-child(3) { transition-delay: 0.15s; }
        .menu-link:hover { opacity: 1 !important; }
        .menu-socials {
            display: flex; align-items: center; gap: 1.2rem; margin-top: 1.5rem;
            opacity: 0; transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .menu-overlay.active .menu-socials { opacity: 0.5; transform: translateX(0); transition-delay: 0.3s; }
        .social-link { color: var(--black); display: inline-flex; transition: color 0.2s ease; }

        /* ===== Top-left logomark ===== */
        .logo-bottom { position: fixed; top: 2rem; left: 2rem; z-index: 10001; background: none; border: none; transition: opacity 0.3s ease; }
        .logo-bottom:hover { opacity: 0.7; }
        .logo-bottom svg { width: 40px; height: 40px; display: block; }

        /* ===== Stage: single non-scrolling landing ===== */
        .stage {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        }
        .hero-wordmark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; width: 20vw; max-width: 280px; height: auto;
            user-select: none; -webkit-user-drag: none; pointer-events: none;
        }

        /* ===== 3x4 project grid (centered, white margin all around) ===== */
        .work-grid {
            height: 76vh; aspect-ratio: 4 / 3; max-width: 80vw;
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr);
            gap: 0.5vw;
        }
        .grid-spacer { background: transparent; }
        .work-card {
            position: relative; width: 100%; height: 100%; overflow: hidden;
            background: #0d0d0d; border-radius: 3px;
        }
        .work-card .card-thumb {
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;
        }
        /* Blurred footage filling the side bars (square videos like hyatt) */
        .work-card .card-fill {
            position: absolute; top: 50%; left: 50%;
            width: 100%; height: 177.78%;
            transform: translate(-50%, -50%) scale(1.18);
            border: 0; z-index: 2; pointer-events: none;
            filter: blur(22px) brightness(0.82);
            opacity: 0; /* instant reveal on hover — no fade */
        }
        /* Main player — sized to the video's native aspect so it isn't over-cropped,
           then scaled by --zoom to fill the 16:9 tile (square videos stay letterboxed). */
        .work-card .card-vid {
            position: absolute; top: 50%; left: 50%;
            height: 100%; width: calc(var(--va, 1.778) * 56.25%);
            transform: translate(-50%, -50%) scale(var(--zoom, 1));
            border: 0; z-index: 3;
            opacity: 0; /* instant reveal on hover — no fade */
            pointer-events: none; /* let the custom cursor keep tracking over the player */
        }
        .work-card.playing .card-vid, .work-card.playing .card-fill { opacity: 1; }
        .work-card .card-scrim {
            position: absolute; inset: 0; z-index: 4; pointer-events: none;
            background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0) 55%);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .work-card:hover .card-scrim, .work-card.playing .card-scrim { opacity: 1; }
        .work-card .card-text {
            position: absolute; left: 0.9rem; bottom: 0.8rem; z-index: 5;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .work-card:hover .card-text, .work-card.playing .card-text { opacity: 1; }
        .work-card .card-client {
            font-size: clamp(0.8rem, 1.2vw, 1.05rem); font-weight: 400; letter-spacing: -0.04em;
            line-height: 1.05; text-transform: lowercase; color: var(--white); margin-bottom: 0.15rem;
        }
        .work-card .card-title {
            font-size: 0.55rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
            color: rgba(255,255,255,0.6); line-height: 1.1;
        }
        body.dark-mode .work-card .card-client { color: var(--white); -webkit-text-fill-color: var(--white); }
        body.dark-mode .work-card .card-title { color: rgba(255,255,255,0.6); -webkit-text-fill-color: rgba(255,255,255,0.6); }

        /* Mobile: let it scroll, 2-up, wordmark pinned at top */
        @media (max-width: 820px) {
            body { overflow: auto; }
            .stage { position: static; min-height: 100%; padding: 18vh 5vw 8vh; }
            .work-grid {
                height: auto; aspect-ratio: auto; max-width: 100%; width: 100%;
                grid-template-columns: repeat(2, 1fr); grid-template-rows: none; gap: 3vw;
            }
            .work-card { aspect-ratio: 16 / 9; }
            .grid-spacer { display: none; }
            .hero-wordmark { position: fixed; top: 1.6rem; width: 38vw; max-width: 200px; }
        }

        /* ===== Footer (fixed in the bottom white margin) ===== */
        .site-footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.1rem 2rem; background: transparent; z-index: 10001;
        }
        @media (max-width: 820px) { .site-footer { position: relative; background: var(--white); } }
        body.dark-mode .site-footer-left, body.dark-mode .footer-link { color: var(--purple); }
        .site-footer-left { font-size: 0.8rem; color: var(--black); }
        .footer-link { color: var(--black); text-decoration: none; opacity: 0.7; }
        .footer-link:hover { opacity: 1; }
        .site-footer-socials { display: flex; align-items: center; gap: 1rem; }
        .dark-mode-toggle { position: relative; display: inline-block; width: 34px; height: 18px; }
        .dark-mode-toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-track {
            position: absolute; inset: 0; background: #d0d0d0; border-radius: 20px; transition: background 0.3s ease;
        }
        .toggle-track::before {
            content: ''; position: absolute; width: 14px; height: 14px; left: 2px; top: 2px;
            background: #fff; border-radius: 50%; transition: transform 0.3s ease;
        }
        .dark-mode-toggle input:checked + .toggle-track { background: var(--purple); }
        .dark-mode-toggle input:checked + .toggle-track::before { transform: translateX(16px); }

        /* ===== Dark mode ===== */
        body.dark-mode { background-color: var(--space-dark); color: var(--purple); }
        body.dark-mode .hero-section,
        body.dark-mode .work-section,
        body.dark-mode .site-footer { background: var(--space-dark); }
        body.dark-mode .plus-icon span { background: var(--purple); }
        body.dark-mode .menu-link,
        body.dark-mode .social-link,
        body.dark-mode .site-footer-left,
        body.dark-mode .footer-link { color: var(--purple); -webkit-text-fill-color: var(--purple); }
        body.dark-mode .logo-bottom svg path { fill: var(--purple) !important; }
        body.dark-mode .cursor { background: var(--purple); }
        body.dark-mode ::selection { background: var(--purple); color: var(--space-dark); -webkit-text-fill-color: var(--space-dark); }
        body.dark-mode .menu-overlay.active { background: rgba(26,26,46,0.4); }

        /* ── Work Viewer ──────────────────────────────────── */
        .work-viewer { position:fixed; inset:0; z-index:1005; background:#000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
        .work-viewer.active { opacity:1; pointer-events:all; }
        .viewer-frame { position:relative; width:90vw; max-width:calc(90vh * 16 / 9); height:calc(90vw * 9 / 16); max-height:90vh; }
        .viewer-frame iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
        .viewer-video-hero { position:absolute; inset:0; }
        .viewer-click-layer { position:absolute; inset:0; z-index:2; }
        .viewer-center-icon { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.7); width:84px; height:84px; border-radius:50%; background:rgba(0,0,0,0.42); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; z-index:4; }
        .viewer-center-icon .cc-ic { width:38px; height:38px; display:none; }
        .viewer-center-icon.show-play .cc-play { display:block; }
        .viewer-center-icon.show-pause .cc-pause { display:block; }
        .viewer-center-icon.flash { animation:ccFlash 0.6s ease-out; }
        @keyframes ccFlash { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.7);} 18%{opacity:1;transform:translate(-50%,-50%) scale(1);} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.3);} }
        .viewer-controls { position:absolute; left:0; right:0; bottom:0; padding:48px 96px 16px 20px; display:flex; align-items:center; gap:10px; background:linear-gradient(transparent,rgba(0,0,0,0.6)); z-index:3; transition:opacity .3s ease,transform .3s ease; }
        .viewer-fs-corner { position:absolute; bottom:14px; right:18px; z-index:5; background:none; border:none; cursor:none; padding:6px; opacity:0.65; transition:opacity 0.2s ease; line-height:0; }
        .viewer-fs-corner:hover { opacity:1; }
        /* volume control: corner button left of the expand button, with a pop-up gauge */
        .viewer-vol { position:absolute; bottom:14px; right:54px; z-index:5; display:flex; align-items:center; justify-content:center; line-height:0; transition:opacity 0.3s ease; }
        .viewer-vol-btn { background:none; border:none; cursor:none; padding:6px; opacity:0.65; transition:opacity 0.2s ease; line-height:0; }
        .viewer-vol-btn:hover { opacity:1; }
        .viewer-vol-btn .vol-ic { display:none; }
        .viewer-vol-btn .vol-on { display:block; }
        .viewer-vol.muted .vol-on { display:none; }
        .viewer-vol.muted .vol-off { display:block; }
        .viewer-vol-gauge { position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); opacity:0; pointer-events:none; transition:opacity 0.18s ease; background:rgba(20,20,20,0.72); border-radius:999px; padding:12px 0; }
        .viewer-vol.show-gauge .viewer-vol-gauge { opacity:1; pointer-events:auto; }
        .viewer-vol-track { width:4px; height:70px; margin:0 13px; background:rgba(255,255,255,0.3); border-radius:999px; position:relative; cursor:none; }
        .viewer-vol-fill { position:absolute; left:0; right:0; bottom:0; height:0%; background:#fff; border-radius:999px; }
        .viewer-video-hero.cs-playing .viewer-controls { opacity:0; transform:translateY(6px); pointer-events:none; }
        .viewer-video-hero.cs-playing.cs-hover .viewer-controls { opacity:1; transform:translateY(0); pointer-events:auto; }
        /* corner buttons (volume + expand) fade out with the controls when the video isn't being hovered */
        .viewer-video-hero.cs-playing ~ .viewer-fs-corner, .viewer-video-hero.cs-playing ~ .viewer-vol { opacity:0; pointer-events:none; }
        .viewer-video-hero.cs-playing.cs-hover ~ .viewer-fs-corner { opacity:0.65; pointer-events:auto; }
        .viewer-video-hero.cs-playing.cs-hover ~ .viewer-vol { opacity:1; pointer-events:auto; }
        .viewer-ctrl-btn { background:none; border:none; padding:4px 6px; flex-shrink:0; cursor:none; }
        .viewer-ctrl-btn .cs-ctrl-icon { display:none; width:14px; height:14px; object-fit:contain; }
        .viewer-ctrl-btn .cs-icon-play { display:block; }
        .viewer-video-hero.cs-playing .viewer-ctrl-btn .cs-icon-play { display:none; }
        .viewer-video-hero.cs-playing .viewer-ctrl-btn .cs-icon-pause { display:block; }
        .viewer-progress { flex:1; padding:8px 0; cursor:none; position:relative; }
        .viewer-progress .cs-progress-track { width:100%; height:2px; background:rgba(255,255,255,0.3); border-radius:999px; position:relative; overflow:hidden; transition:height 0.15s ease; }
        .viewer-progress .cs-progress-fill { position:absolute; left:0; top:0; bottom:0; width:0%; background:#fff; border-radius:999px; }
        .viewer-progress .cs-progress-thumb { position:absolute; top:50%; left:0; width:11px; height:11px; border-radius:50%; background:#fff; transform:translate(-50%,-50%); opacity:0; transition:opacity 0.15s ease; pointer-events:none; box-shadow:0 1px 5px rgba(0,0,0,0.5); }
        .viewer-progress:hover .cs-progress-thumb, .viewer-progress.dragging .cs-progress-thumb { opacity:1; }
        .viewer-progress:hover .cs-progress-track, .viewer-progress.dragging .cs-progress-track { height:4px; }
        /* scrubber frame preview (mini player seeked to the cursor time) */
        .scrub-preview { position:absolute; bottom:calc(100% + 14px); left:0; transform:translateX(-50%); width:168px; opacity:0; pointer-events:none; transition:opacity 0.12s ease; z-index:6; }
        .scrub-preview.show { opacity:1; }
        .scrub-preview-frame { width:168px; height:95px; border-radius:6px; overflow:hidden; background:#000; box-shadow:0 10px 34px rgba(0,0,0,0.55); position:relative; }
        .scrub-preview-frame iframe { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:100%; height:100%; min-width:169px; min-height:95px; border:none; pointer-events:none; }
        .scrub-preview-time { display:block; text-align:center; margin-top:5px; font-size:11px; color:#fff; font-family:'Space Grotesk',sans-serif; letter-spacing:-0.03em; text-shadow:0 1px 3px rgba(0,0,0,0.65); }
        .viewer-time { font-size:11px; color:rgba(255,255,255,0.7); white-space:nowrap; font-family:'Space Grotesk',sans-serif; letter-spacing:-0.04em; }
        .viewer-close { position:absolute; top:1.5rem; right:1.5rem; z-index:10; background:none; border:none; cursor:none; padding:0.5rem; opacity:0.5; transition:opacity 0.2s; line-height:0; }
        .viewer-close:hover { opacity:1; }
        .viewer-meta { position:absolute; bottom:2rem; left:3rem; display:none; flex-direction:column; gap:0.2rem; pointer-events:none; }
        .viewer-client-label { font-size:0.6rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.4); }
        .viewer-title-label { font-size:0.95rem; font-weight:400; color:rgba(255,255,255,0.85); text-transform:lowercase; }
        .viewer-nav { display:none; position:absolute; top:50%; transform:translateY(-50%); background:none; border:none; cursor:none; padding:1.2rem; opacity:0.4; transition:opacity 0.2s; line-height:0; }
        .viewer-nav:hover { opacity:1; }
        .viewer-prev { left:0.5rem; }
        .viewer-next { right:0.5rem; }
        /* viewer open: hide page chrome (menu +) and the corner close; clicking the margin closes */
        body.viewer-open .nav { opacity:0 !important; pointer-events:none !important; }
        body.viewer-open .logo-bottom, body.viewer-open .site-footer { opacity:0 !important; pointer-events:none !important; }
        /* fullscreen: let the native cursor show (the custom cursor can't render outside the fullscreen element) */
        :fullscreen, :fullscreen * { cursor:auto !important; }
        :-webkit-full-screen, :-webkit-full-screen * { cursor:auto !important; }
        /* fullscreen idle: hide cursor + controls + expand button after 1s of no movement */
        #viewerFrame.fs-idle, #viewerFrame.fs-idle * { cursor:none !important; }
        #viewerFrame.fs-idle .viewer-controls, #viewerFrame.fs-idle .viewer-fs-corner, #viewerFrame.fs-idle .viewer-vol { opacity:0 !important; pointer-events:none !important; }
        .viewer-close { display:none; }
        /* EXIT cursor: knockout label shown when the pointer leaves the video bounds */
        #viewerExitCursor { position:fixed; left:-200px; top:-200px; text-transform:uppercase;
            transform:translate(-50%,-50%) scale(.85); opacity:0; pointer-events:none; z-index:10080;
            mix-blend-mode:difference; transition:opacity .2s ease,transform .25s cubic-bezier(.2,.8,.2,1);
            will-change:transform,left,top,opacity; }
        #viewerExitCursor.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
        body.viewer-exit-active .cursor { opacity:0 !important; }
    </style>
</head>
<body><script>try{if(localStorage.getItem("darkMode")!=="false")document.body.classList.add("dark-mode");}catch(e){}</script>
    <div class="cursor" id="cursor"></div>

    <!-- Nav -->
    <nav class="nav">
        <div class="menu-toggle" id="menuToggle" data-cursor="menu">
            <div class="plus-icon"><span></span><span></span></div>
        </div>
    </nav>

    <!-- Menu overlay -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-links">
            <a href="/editors" class="menu-link">editors</a>
            <a href="/about" class="menu-link">about</a>
            <a href="/contact" class="menu-link">contact</a>
        </div>
        <div class="menu-socials">
            <a href="https://www.instagram.com/ionicpost" target="_blank" rel="noopener" class="social-link" aria-label="Instagram">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor"/></svg>
            </a>
            <a href="https://www.linkedin.com/company/ionic-post/" target="_blank" rel="noopener" class="social-link" aria-label="LinkedIn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" stroke="currentColor" stroke-width="2" fill="none"/><rect x="2" y="9" width="4" height="12" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="4" cy="4" r="2" stroke="currentColor" stroke-width="2" fill="none"/></svg>
            </a>
        </div>
    </div>

    <!-- Top-left logomark -->
    <a href="/" class="logo-bottom" data-cursor="home" aria-label="Ionic Post home">
        <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="#7c5cfc" d="M80 18 a22 22 0 1 0 0 44 a22 22 0 1 0 0 -44 z"/><path fill="#7c5cfc" d="M63 72 h34 v78 h-34 z"/>
        </svg>
    </a>

    <main class="stage">

    <script src="https://player.vimeo.com/api/player.js"></script>

    <script>
    // ===== Projects (Jacob Frost's reel — placeholder until per-client reels land) =====
    // va = native video aspect ratio (w/h); zoom = scale applied so it fills the
    // 16:9 tile nicely; fill = blurred footage fills the side bars (square video).
    const PROJECTS = [
        { client: 'archer money',   title: "here's your f**king money!", vimeo: '1200282915', hash: 'ffeabc1665', va: 1.778, zoom: 1.3, thumbnail: 'https://i.vimeocdn.com/video/2167332209-2e6e17f30b93c08b842d27b71c059107ec92ba441d1f37f630c59ddbab7e6362-d_1280x720' },
        { client: 'onco optima',    title: 'refuse to leave it to chance', vimeo: '1184586128', va: 1.433, zoom: 1.3, thumbnail: 'https://i.vimeocdn.com/video/2147773004-bfe04ac45210e7486d3ec60c04f84db2026c53fd35be3f9319ab3f4f770a5d61-d_1280x720' },
        { client: 'wabi',           title: 'when did we stop playing', vimeo: '1161268499', va: 1.433, zoom: 1.3, thumbnail: 'https://i.vimeocdn.com/video/2116569980-827a4c9a901fdcce2c94ba3cec07bb31cda14e49b9fc66e30805132417bf6713-d_1280x720' },
        { client: 'pocket',         title: 'launch', vimeo: '1170047221', hash: '6ac82c19db', va: 1.778, zoom: 1,   thumbnail: 'https://i.vimeocdn.com/video/2129030620-e34b7e0c8001f6efcbcb482157f38106e4e2d3c1037a7a1a0a6c7c923f294342-d_1280x720' },
        { client: "arc'teryx",      title: 'a city to summit', vimeo: '1141586908', va: 1.333, zoom: 1.7, thumbnail: 'https://i.vimeocdn.com/video/2089031096-1db55212ce8d60b1ffaa49c54beb793e20934cb93e7df1fd0e2ac6ee80619aeb-d_1280x720' },
        { client: 'pinch',          title: 'a holiday campaign', vimeo: '1140543709', va: 1.433, zoom: 1.3, thumbnail: 'https://i.vimeocdn.com/video/2089993227-e000ed9b7ef428ebf6588769ae040780042629649a7118b7c81199783dabe96a-d_1280x720' },
        { client: 'fare',           title: 'beyond the bowl', vimeo: '1175563835', va: 1.778, zoom: 1,   thumbnail: 'https://i.vimeocdn.com/video/2136430771-f53c21717a7bbd356033553598ee8ab44587fc7bfb1f902567c96ef2ccf98eb5-d_1280x720' },
        { client: 'world of hyatt', title: 'jess pegula × us open', vimeo: '1149097153', va: 1, zoom: 1, fill: true, thumbnail: 'https://i.vimeocdn.com/video/2099561094-be2875973c8819d32c4faae7afab7681cb8564188b1271444c1a43dabb5315d5-d_1280x720' },
        { client: 'aesop',          title: 'skin', vimeo: '1167988129', va: 1.5, zoom: 1.3, thumbnail: 'https://i.vimeocdn.com/video/2126179638-f6c354c75518a1be78a136a9d2531222a8d363f2f1dec81d60727825d123bc01-d_1280' },
        { client: 'ever',           title: 'here to be great', vimeo: '1141278566', va: 1.433, zoom: 1.3, thumbnail: 'https://i.vimeocdn.com/video/2099560891-36e638960a316e25a52fbf66821647feab77b29c0a3930becefced787395728d-d_1280' },
        { client: 'bo house',       title: 'villa peninsula', vimeo: '1205559620', va: 1.433, zoom: 1.3, thumbnail: 'https://i.vimeocdn.com/video/2174174962-87f9a5a012a9bd00951a8b149e0debeb596bad2f3b43d4ebab238312fe4bf2c9-d_1280x720' }
    ];

    const grid = document.getElementById('workGrid');
    // 11 projects in the 3x4 frame (one empty cell, bottom-right). When a 12th
    // reel lands it fills automatically. Spacers hidden on mobile.
    const SPACER_AT = {};
    let pi = 0;
    for (let i = 0; i < 12; i++) {
        if (SPACER_AT[i]) {
            const sp = document.createElement('div');
            sp.className = 'grid-spacer';
            grid.appendChild(sp);
            continue;
        }
        const p = PROJECTS[pi++];
        if (!p) break;
        const card = document.createElement('div');
        card.className = 'work-card';
        card.dataset.vimeo = p.vimeo;
        card.dataset.hash = p.hash || '';
        card.dataset.fill = p.fill ? '1' : '';
        card.setAttribute('data-cursor', 'view');
        // index into PROJECTS/viewerItems for click-to-open (spacers don't advance this)
        card.dataset.viewerIndex = String(pi - 1);
        card.style.setProperty('--va', p.va || 1.778);
        card.style.setProperty('--zoom', p.zoom || 1);
        card.innerHTML =
            '<img class="card-thumb" src="' + p.thumbnail + '" width="1280" height="720" alt="' + p.client + '" loading="lazy">' +
            '<div class="card-scrim"></div>' +
            '<div class="card-text"><p class="card-client">' + p.client + '</p>' +
            (p.title ? '<p class="card-title">' + p.title + '</p>' : '') + '</div>';
        card.addEventListener('click', function(e) {
            e.preventDefault();
            if (typeof openViewer === 'function') openViewer(parseInt(card.dataset.viewerIndex, 10));
        });
        grid.appendChild(card);
    }

    // Reels play on hover (desktop) — same pattern as the editors roster. Posters
    // stay as the resting state so the grid reads even before anything plays.
    const cards = Array.from(document.querySelectorAll('.work-card'));
    const finePointer = window.matchMedia('(pointer: fine)').matches;

    function makeVimeo(card, cls) {
        const v = card.dataset.vimeo, h = card.dataset.hash;
        const iframe = document.createElement('iframe');
        iframe.className = cls;
        iframe.allow = 'autoplay; fullscreen; picture-in-picture';
        iframe.src = 'https://player.vimeo.com/video/' + v +
            '?' + (h ? 'h=' + h + '&' : '') +
            'badge=0&autopause=0&autoplay=1&loop=1&muted=1&controls=0&background=1&dnt=1&quality=540p';
        card.appendChild(iframe);
    }

    // Preload every reel up front (each card already has its player buffering and
    // looping behind the poster) so hovering reveals it instantly — no load, no fade.
    function buildReel(card) {
        if (card.querySelector('.card-vid')) return;
        if (card.dataset.fill) makeVimeo(card, 'card-fill'); // blurred edge fill behind
        makeVimeo(card, 'card-vid');
    }

    if (finePointer) {
        cards.forEach(function(card) {
            buildReel(card);
            card.addEventListener('mouseenter', function() { card.classList.add('playing'); });
            card.addEventListener('mouseleave', function() { card.classList.remove('playing'); });
        });
    } else {
        // Touch devices: build + reveal the reel for whichever card is in view.
        const io = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) { buildReel(entry.target); entry.target.classList.add('playing'); }
            });
        }, { threshold: 0.5 });
        cards.forEach(function(c) { io.observe(c); });
    }

    // ===== Menu =====
    const menuToggle = document.getElementById('menuToggle');
    const menuOverlay = document.getElementById('menuOverlay');
    menuToggle.addEventListener('click', function() {
        menuToggle.classList.toggle('active');
        menuOverlay.classList.toggle('active');
    });
    menuOverlay.addEventListener('click', function(e) {
        if (e.target === menuOverlay) { menuToggle.classList.remove('active'); menuOverlay.classList.remove('active'); }
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { menuToggle.classList.remove('active'); menuOverlay.classList.remove('active'); }
    });

    // ===== Custom cursor (matches Covalent: 0.35 lerp, left/top centered) =====
    const cursor = document.getElementById('cursor');
    let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;
    document.addEventListener('mousemove', function(e) { mouseX = e.clientX; mouseY = e.clientY; });
    (function animateCursor() {
        cursorX += (mouseX - cursorX) * 0.35;
        cursorY += (mouseY - cursorY) * 0.35;
        cursor.style.left = cursorX + 'px';
        cursor.style.top = cursorY + 'px';
        requestAnimationFrame(animateCursor);
    })();

    // ===== Dark mode =====
    (function() {
        const toggle = document.getElementById('darkModeToggle');
        if (localStorage.getItem('darkMode') !== 'false') { document.body.classList.add('dark-mode'); toggle.checked = true; }
        toggle.addEventListener('change', function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        });
    })();

    // ===== Work Viewer (ported from the editor profile pages) =====
    var openViewer;
    (function initWorkViewer() {
        // Build viewerItems directly from PROJECTS, in the same order the cards render.
        var viewerItems = PROJECTS.map(function(p) {
            return { vimeo: p.vimeo, hash: p.hash || '', client: p.client, title: p.title };
        });
        var viewer   = document.getElementById('workViewer');
        var frame    = document.getElementById('viewerFrame');
        var vHero    = document.getElementById('viewerVideoHero');
        var iframe   = document.getElementById('viewerIframe');
        var clientEl = document.getElementById('viewerClient');
        var titleEl  = document.getElementById('viewerTitleText');
        var closeBtn = document.getElementById('viewerClose');
        var prevBtn  = document.getElementById('viewerPrev');
        var nextBtn  = document.getElementById('viewerNext');
        var ppBtn    = document.getElementById('viewerPlayPause');
        var progEl   = document.getElementById('viewerProgress');
        var fillEl   = document.getElementById('viewerFill');
        var thumb    = document.getElementById('viewerThumb');
        var timeEl   = document.getElementById('viewerTime');
        var fsBtn    = document.getElementById('viewerFsBtn');
        var clickLayer = document.getElementById('viewerClickLayer');
        var current = -1, vPlayer = null, vDuration = 0, vPlaying = false, idleTimer = null, dragging = false, vVolume = 1, vMuted = true, volDragging = false;
        // EXIT cursor: knockout "EXIT" label shown over the margin around the video
        var exitCur = document.createElement('div');
        exitCur.id='viewerExitCursor'; exitCur.setAttribute('aria-hidden','true');
        (function(){ var w=Math.round('EXIT'.length*8.6+28), h=26;
            exitCur.innerHTML='<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg"><defs><mask id="exitCurMask"><rect width="'+w+'" height="'+h+'" rx="5" fill="#fff"/><text x="'+(w/2)+'" y="14" text-anchor="middle" dominant-baseline="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="12" letter-spacing="-0.2" fill="#000">EXIT</text></mask></defs><rect width="'+w+'" height="'+h+'" rx="5" fill="#fff" mask="url(#exitCurMask)"/></svg>';
        })();
        document.body.appendChild(exitCur);
        function ptrInsideFrame(e){ var r=frame.getBoundingClientRect(); return e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom; }
        viewer.addEventListener('mousemove', function(e){
            if(!viewer.classList.contains('active')) return;
            var overNav = e.target && e.target.closest && e.target.closest('.viewer-nav');
            if(ptrInsideFrame(e) || overNav){ exitCur.classList.remove('show'); document.body.classList.remove('viewer-exit-active'); }
            else { exitCur.style.left=e.clientX+'px'; exitCur.style.top=e.clientY+'px'; exitCur.classList.add('show'); document.body.classList.add('viewer-exit-active'); }
        }, {passive:true});
        function fmt(s) { var m=Math.floor(s/60),sec=Math.floor(s%60); return (m<10?'0':'')+m+':'+(sec<10?'0':'')+sec; }
        function setPlaying(p) { vPlaying=p; vHero.classList.toggle('cs-playing',p); if(ppBtn) ppBtn.setAttribute('data-cursor', p?'pause':'play'); }
        function resetPlayer() {
            if (vPlayer) { try { vPlayer.destroy(); } catch(e){} vPlayer=null; }
            var stray=vHero.querySelector('iframe'); if(stray) stray.remove();
            vPlaying=false; vDuration=0;
            vHero.classList.remove('cs-playing','cs-hover');
            if (fillEl) fillEl.style.width='0%';
            if (thumb) thumb.style.left='0%';
            if (timeEl) timeEl.textContent='00:00 / 00:00';
            hidePrev(); teardownPrev();
        }
        function bindPlayer(p) {
            p.getDuration().then(function(d){ vDuration=d; if(timeEl&&d) timeEl.textContent='00:00 / '+fmt(d); }).catch(function(){});
            p.on('play',  function(){ setPlaying(true); });
            p.on('pause', function(){ setPlaying(false); });
            p.on('ended', function(){ setPlaying(false); });
            p.on('timeupdate', function(data){ if(!vDuration||!fillEl||dragging)return; var pc=data.seconds/vDuration*100; fillEl.style.width=pc+'%'; if(thumb) thumb.style.left=pc+'%'; if(timeEl) timeEl.textContent=fmt(data.seconds)+' / '+fmt(vDuration); });
        }
        function whenVimeoReady(cb){
            if(window.Vimeo){ cb(); return; }
            var n=0; (function poll(){ if(window.Vimeo) return cb(); if(n++>120) return; setTimeout(poll,50); })();
        }
        openViewer = function(idx) {
            current=idx; var item=viewerItems[idx];
            resetPlayer();
            // Build a fresh iframe each open — Vimeo's player.destroy() removes the
            // iframe from the DOM, so reusing one breaks every reopen (the prod bug).
            iframe=document.createElement('iframe');
            iframe.id='viewerIframe';
            iframe.setAttribute('frameborder','0');
            iframe.setAttribute('allow','autoplay; fullscreen; picture-in-picture');
            iframe.setAttribute('allowfullscreen','');
            iframe.src='https://player.vimeo.com/video/'+item.vimeo+'?'+(item.hash?'h='+item.hash+'&':'')+'autoplay=1&muted=1&controls=0&dnt=1&playsinline=1';
            vHero.insertBefore(iframe, vHero.firstChild);
            clientEl.textContent=item.client||''; titleEl.textContent=item.title||'';
            viewer.classList.add('active'); document.body.classList.add('viewer-open'); document.body.classList.remove('click-cursor-active'); document.body.style.overflow='hidden';
            prevBtn.style.opacity=idx>0?'0.6':'0.15';
            nextBtn.style.opacity=idx<viewerItems.length-1?'0.6':'0.15';
            // Bind the player as soon as the SDK is ready — don't depend on iframe.onload
            // (the onload+SDK race is what left the controls dead in production).
            whenVimeoReady(function(){
                try{
                    vPlayer=new Vimeo.Player(iframe);
                    bindPlayer(vPlayer);
                    vPlayer.ready().then(function(){ vPlayer.play().catch(function(){}); applyVol(); }).catch(function(){});
                }catch(e){}
            });
        };
        function closeViewer() {
            viewer.classList.remove('active');
            document.body.classList.remove('viewer-open','viewer-exit-active');
            if(exitCur) exitCur.classList.remove('show');
            clearTimeout(idleTimer); resetPlayer();
            document.body.style.overflow='';
        }
        var centerIcon=document.getElementById('viewerCenterIcon');
        function flashCenter(playing){ if(!centerIcon)return; centerIcon.classList.remove('flash','show-play','show-pause'); void centerIcon.offsetWidth; centerIcon.classList.add(playing?'show-play':'show-pause','flash'); }
        function togglePlay(flash) { if(!vPlayer)return; var willPlay=!vPlaying; if(vPlaying) vPlayer.pause(); else vPlayer.play(); if(flash) flashCenter(willPlay); }
        clickLayer.addEventListener('click', function(e){ e.stopPropagation(); togglePlay(true); });
        ppBtn.addEventListener('click', function(e){ e.stopPropagation(); togglePlay(false); });
        // scrubber: click + drag with a visible thumb that tracks the cursor
        function scrubPct(e){ var r=progEl.getBoundingClientRect(); return Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)); }
        function scrubPreview(p){ if(fillEl) fillEl.style.width=(p*100)+'%'; if(thumb) thumb.style.left=(p*100)+'%'; if(timeEl&&vDuration) timeEl.textContent=fmt(p*vDuration)+' / '+fmt(vDuration); }
        // frame preview: a 2nd hidden Vimeo player seeked to the cursor time (Vimeo is
        // cross-origin, so a seeked mini-player is the only way to show the actual frame)
        var scrubPrev=document.getElementById('scrubPreview'), scrubPrevFrame=document.getElementById('scrubPreviewFrame'), scrubPrevTime=document.getElementById('scrubPreviewTime');
        var prevPlayer=null, prevReady=false, prevVimeo=null, prevSeeking=false, prevPending=null;
        function teardownPrev(){ if(prevPlayer){ try{prevPlayer.destroy();}catch(e){} } prevPlayer=null; prevReady=false; prevVimeo=null; prevSeeking=false; prevPending=null; if(scrubPrevFrame) scrubPrevFrame.innerHTML=''; }
        function buildPrev(){
            var item=viewerItems[current]; if(!item||!item.vimeo||!scrubPrevFrame) return;
            if(prevVimeo===item.vimeo && prevPlayer) return;
            teardownPrev(); prevVimeo=item.vimeo;
            var pf=document.createElement('iframe'); pf.setAttribute('frameborder','0'); pf.setAttribute('allow','autoplay');
            pf.src='https://player.vimeo.com/video/'+item.vimeo+'?'+(item.hash?'h='+item.hash+'&':'')+'background=1&muted=1&controls=0&dnt=1';
            scrubPrevFrame.appendChild(pf);
            whenVimeoReady(function(){ try{ prevPlayer=new Vimeo.Player(pf); prevPlayer.ready().then(function(){ prevReady=true; if(prevPending!=null){ var t=prevPending; prevPending=null; seekPrev(t); } }).catch(function(){}); }catch(e){} });
        }
        function seekPrev(t){
            if(!prevReady||!prevPlayer){ prevPending=t; return; }
            if(prevSeeking){ prevPending=t; return; }
            prevSeeking=true;
            prevPlayer.setCurrentTime(t).then(function(){ prevSeeking=false; if(prevPending!=null){ var n=prevPending; prevPending=null; seekPrev(n); } }).catch(function(){ prevSeeking=false; });
        }
        function showPrev(e){
            if(!vDuration||!scrubPrev) return;
            buildPrev();
            var p=scrubPct(e), r=progEl.getBoundingClientRect();
            scrubPrev.style.left=Math.max(84, Math.min(r.width-84, e.clientX-r.left))+'px';
            if(scrubPrevTime) scrubPrevTime.textContent=fmt(p*vDuration);
            scrubPrev.classList.add('show');
            seekPrev(p*vDuration);
        }
        function hidePrev(){ if(scrubPrev) scrubPrev.classList.remove('show'); }
        progEl.addEventListener('mousedown', function(e){
            if(!vPlayer||!vDuration)return;
            e.preventDefault(); e.stopPropagation();
            dragging=true; progEl.classList.add('dragging'); scrubPreview(scrubPct(e)); showPrev(e);
        });
        progEl.addEventListener('mousemove', function(e){ if(!dragging) showPrev(e); }, {passive:true});
        progEl.addEventListener('mouseleave', function(){ if(!dragging) hidePrev(); }, {passive:true});
        document.addEventListener('mousemove', function(e){ if(dragging){ scrubPreview(scrubPct(e)); showPrev(e); } }, {passive:true});
        document.addEventListener('mouseup', function(e){
            if(!dragging)return;
            dragging=false; progEl.classList.remove('dragging');
            var p=scrubPct(e); if(vPlayer&&vDuration) vPlayer.setCurrentTime(p*vDuration).catch(function(){});
            hidePrev();
        });
        fsBtn.addEventListener('click', function(e){
            e.stopPropagation();
            var target=frame||viewer;
            if(document.fullscreenElement) document.exitFullscreen().catch(function(){});
            else target.requestFullscreen().catch(function(){});
        });
        // fullscreen: hide cursor + controls + expand button after 1s of no movement
        var fsIdleTimer=null;
        function inFs(){ return document.fullscreenElement||document.webkitFullscreenElement; }
        function fsIdleHide(){ if(inFs()) frame.classList.add('fs-idle'); }
        function fsPoke(){ if(fsIdleTimer)clearTimeout(fsIdleTimer); frame.classList.remove('fs-idle'); if(inFs()) fsIdleTimer=setTimeout(fsIdleHide,1000); }
        function fsLeave(){ frame.classList.remove('fs-idle'); if(fsIdleTimer){clearTimeout(fsIdleTimer);fsIdleTimer=null;} }
        document.addEventListener('mousemove', function(){ if(inFs()) fsPoke(); }, {passive:true});
        document.addEventListener('fullscreenchange', function(){ inFs()?fsPoke():fsLeave(); });
        document.addEventListener('webkitfullscreenchange', function(){ inFs()?fsPoke():fsLeave(); });
        // volume: mute toggle + draggable gauge (videos autoplay muted, so this is how sound comes on)
        var volWrap=document.getElementById('viewerVol'), volBtn=document.getElementById('viewerVolBtn'),
            volTrack=document.getElementById('viewerVolTrack'), volFill=document.getElementById('viewerVolFill'), volHideT=null;
        function renderVol(){ var off=(vMuted||vVolume===0); volWrap.classList.toggle('muted',off); volFill.style.height=((off?0:vVolume)*100)+'%'; volBtn.setAttribute('data-cursor',off?'unmute':'mute'); }
        function applyVol(){ if(!vPlayer)return; var off=(vMuted||vVolume===0); try{ if(vPlayer.setMuted) vPlayer.setMuted(off); }catch(e){} try{ vPlayer.setVolume(off?0:vVolume).catch(function(){}); }catch(e){} renderVol(); }
        function showGauge(){ clearTimeout(volHideT); volWrap.classList.add('show-gauge'); }
        function hideGaugeSoon(){ clearTimeout(volHideT); volHideT=setTimeout(function(){ if(!volDragging) volWrap.classList.remove('show-gauge'); },500); }
        function volFromY(e){ var r=volTrack.getBoundingClientRect(); return Math.max(0,Math.min(1, 1-(e.clientY-r.top)/r.height)); }
        volBtn.addEventListener('click', function(e){ e.stopPropagation(); vMuted=!vMuted; if(!vMuted&&vVolume===0) vVolume=1; applyVol(); showGauge(); });
        volWrap.addEventListener('mouseenter', showGauge);
        volWrap.addEventListener('mouseleave', hideGaugeSoon);
        volTrack.addEventListener('mousedown', function(e){ e.preventDefault(); e.stopPropagation(); volDragging=true; var v=volFromY(e); vVolume=v; vMuted=(v===0); applyVol(); });
        document.addEventListener('mousemove', function(e){ if(volDragging){ var v=volFromY(e); vVolume=v; vMuted=(v===0); applyVol(); } }, {passive:true});
        document.addEventListener('mouseup', function(){ volDragging=false; });
        renderVol();
        // Keep the controls + corner buttons alive while the cursor is anywhere in the
        // frame (incl. the volume/expand buttons, which are siblings of the video-hero).
        // Don't auto-hide while the volume gauge is open or being dragged.
        function csIdleHide(){ if(!volWrap.classList.contains('show-gauge') && !volDragging) vHero.classList.remove('cs-hover'); }
        function csPoke(){ vHero.classList.add('cs-hover'); clearTimeout(idleTimer); if(vPlaying) idleTimer=setTimeout(csIdleHide,2000); }
        frame.addEventListener('mouseenter', csPoke);
        frame.addEventListener('mousemove',  csPoke);
        frame.addEventListener('mouseleave', function(){ vHero.classList.remove('cs-hover'); clearTimeout(idleTimer); });
        if(closeBtn) closeBtn.addEventListener('click',closeViewer);
        // click anywhere outside the video bounds closes (the EXIT cursor signals this)
        viewer.addEventListener('click',function(e){
            if(!viewer.classList.contains('active'))return;
            if(e.target && e.target.closest && e.target.closest('.viewer-nav')) return;
            if(!ptrInsideFrame(e)) closeViewer();
        });
        prevBtn.addEventListener('click',function(e){e.stopPropagation();if(current>0)openViewer(current-1);});
        nextBtn.addEventListener('click',function(e){e.stopPropagation();if(current<viewerItems.length-1)openViewer(current+1);});
        document.addEventListener('keydown',function(e){
            if(!viewer.classList.contains('active'))return;
            if(e.key==='Escape')closeViewer();
            if(e.key==='ArrowLeft'&&current>0)openViewer(current-1);
            if(e.key==='ArrowRight'&&current<viewerItems.length-1)openViewer(current+1);
            if(e.key===' '){e.preventDefault();togglePlay(true);}
        });
    })();

    // ===== Custom click cursor: knockout label box over clickable elements =====
    (function(){
      try {
        if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return;
        var st = document.createElement('style');
        st.textContent = '#clickCursor{position:fixed;text-transform:uppercase;left:-200px;top:-200px;transform:translate(-50%,-50%) scale(.7);opacity:0;pointer-events:none;z-index:10050;mix-blend-mode:difference;transition:opacity .25s ease,transform .3s cubic-bezier(.2,.8,.2,1);will-change:transform,left,top,opacity}#clickCursor.show{opacity:1;transform:translate(-50%,-50%) scale(1)}body.click-cursor-active .cursor{opacity:0 !important}';
        document.head.appendChild(st);
        var box = document.createElement('div');
        box.id = 'clickCursor';
        box.setAttribute('aria-hidden','true');
        document.body.appendChild(box);
        function makeBox(label){
          var w = Math.max(56, Math.round(label.length * 8.6 + 28)), h = 26;
          return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg"><defs><mask id="clickCursorMask"><rect width="'+w+'" height="'+h+'" rx="5" fill="#fff"/><text x="'+(w/2)+'" y="14" text-anchor="middle" dominant-baseline="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="12" letter-spacing="-0.2" fill="#000">'+label+'</text></mask></defs><rect width="'+w+'" height="'+h+'" rx="5" fill="#fff" mask="url(#clickCursorMask)"/></svg>';
        }
        var current = '';
        function setLabel(l){ if (l === current) return; current = l; box.innerHTML = makeBox(l); }
        setLabel('CLICK');
        function menuOpen(){ return !!document.querySelector('.menu-overlay.active'); }
        function hide(){ box.classList.remove('show'); document.body.classList.remove('click-cursor-active'); }
        function show(el){
          var vctrl = el.closest && el.closest('.viewer-ctrl-btn, .viewer-fs-corner, .viewer-vol-btn');
          if (menuOpen() || (document.body.classList.contains('viewer-open') && !vctrl)) { hide(); return; }
          var lbl = (el.getAttribute && el.getAttribute('data-cursor')) || 'CLICK';
          setLabel(String(lbl).toUpperCase());
          box.classList.add('show');
          document.body.classList.add('click-cursor-active');
        }
        document.addEventListener('mousemove', function(e){
          box.style.left = e.clientX + 'px'; box.style.top = e.clientY + 'px';
          if (menuOpen() && box.classList.contains('show')) hide();
        }, {passive:true});
        var sel = 'a[href], button, label, input, select, textarea, summary, [role=button], [onclick], .dark-mode-toggle, .logo-bottom, [data-cursor]';
        function hit(t){ if (!t || !t.closest) return null; if (t.closest('.site-footer')) return null; return t.closest(sel); }
        document.addEventListener('mouseover', function(e){ var el = hit(e.target); if (el) show(el); }, {passive:true});
        document.addEventListener('mouseout', function(e){ if (hit(e.target) && !hit(e.relatedTarget)) hide(); }, {passive:true});
      } catch(err){}
    })();
    </script>
</body>
