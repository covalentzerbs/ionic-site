    <!-- Preload client logos so they're ready before loading screen ends -->
    <link rel="preload" as="image" href="assets/logos/client-logos/onco-optima-logo.png">
    <link rel="preload" as="image" href="assets/logos/client-logos/wabi-logo-white.png">
    <link rel="preload" as="image" href="assets/logos/client-logos/aesop-logo-white.png">
    <link rel="preload" as="image" href="assets/logos/client-logos/pinch.png">
    <link rel="preload" as="image" href="assets/logos/client-logos/fare-logo-white.png">
    <link rel="preload" as="image" href="assets/logos/client-logos/arcteryx-logo.png">
    <link rel="preload" as="image" href="assets/logos/client-logos/woh-logo-white.png">
    <link rel="preload" as="image" href="assets/logos/client-logos/ever-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Satoshi';
            src: url('assets/fonts/Satoshi-Variable.ttf') format('truetype');
            font-weight: 300 900;
            font-display: swap;
        }

        /* CSS Variables */
        :root {
            --ice: #FAFBFC;
            --bond-blue: #5979e9;
            --black: #0A0A0A;
            --gray: #6B7280;
            --white: #FFFFFF;
        }

        /* Reset */
        /* Explicit root — bfcache restore can miss the * selector */
        html, body, .scroll-container { cursor: none !important; }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        a, button, label { outline: none; }

        ::selection {
            background: var(--black);
            color: var(--white);
            -webkit-text-fill-color: var(--white);
        }

        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        /* Body — no scroll, scroll container handles it */
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--white);
            color: var(--black);
            letter-spacing: -0.07em;
        }

        /* ==================== */
        /* HORIZONTAL SCROLL CONTAINER */
        /* ==================== */
        .scroll-container {
            display: flex;
            flex-direction: row;
            overflow-x: scroll;
            overflow-y: hidden;
            width: 100vw;
            height: 100vh;
            scroll-snap-type: none;
            scroll-behavior: auto;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
            -webkit-overflow-scrolling: touch;
        }

        .scroll-container::-webkit-scrollbar {
            display: none; /* Chrome, Safari */
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--white);
            pointer-events: none;
            z-index: 10001;
            mix-blend-mode: difference;
            left: 0;
            top: 0;
            will-change: transform;
        }

        /* Navigation - Plus Menu */
        .nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 2rem;
            z-index: 10001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .nav.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .menu-toggle {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-toggle.active {
            transform: rotate(45deg);
        }

        .plus-icon {
            width: 18px;
            height: 18px;
            position: relative;
        }

        .plus-icon span {
            display: block;
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--black);
            top: 50%;
            left: 0;
            transition: all 0.3s ease;
        }

        .plus-icon span:first-child {
            transform: translateY(-50%) rotate(90deg);
        }

        .plus-icon span:last-child {
            transform: translateY(-50%);
        }

        /* Expanded Menu */
        .menu-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding: 3rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            pointer-events: auto;
            opacity: 1;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.3);
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0;
        }

        .menu-spacer {
            height: 0.8em;
        }

        .menu-socials {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-top: 1.5rem;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-overlay.active .menu-socials {
            opacity: 0.5;
            transform: translateX(0);
            transition-delay: 0.3s;
        }

        .menu-socials .social-link {
            color: var(--black);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .menu-link {
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 500;
            color: var(--black);
            text-decoration: none;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.07em;
            line-height: 1.05;
            position: relative;
            display: inline-block;
        }

        .menu-overlay.active .menu-link {
            opacity: 0.6;
            transform: translateX(0);
        }

        .menu-overlay.active .menu-link:nth-child(1) { transition-delay: 0.05s; }
        .menu-overlay.active .menu-link:nth-child(2) { transition-delay: 0.1s; }
        .menu-overlay.active .menu-link:nth-child(3) { transition-delay: 0.15s; }
        .menu-overlay.active .menu-link:nth-child(4) { transition-delay: 0.25s; }
        .menu-overlay.active .menu-link:nth-child(5) { transition-delay: 0.3s; }

        .menu-link-lab {
            color: #A6FF8E;
        }

        .menu-overlay.active .menu-link-lab {
            opacity: 0.5 !important;
            transition: opacity 0.12s ease !important;
        }

        .menu-overlay.active .menu-link-lab:hover {
            opacity: 1 !important;
            transition: opacity 0.12s ease !important;
        }

        .menu-link-bond {
            font-family: 'Satoshi', sans-serif;
            font-weight: 500;
            letter-spacing: -0.03em;
            color: var(--bond-blue);
            text-transform: none;
        }

        .menu-link:hover {
            opacity: 1 !important;
        }

        .menu-link-lab:hover {
            color: #A6FF8E !important;
            -webkit-text-fill-color: #A6FF8E !important;
            opacity: 1 !important;
        }

        .menu-link-bond:hover {
            color: var(--bond-blue) !important;
            -webkit-text-fill-color: var(--bond-blue) !important;
        }

        .menu-link.current {
            opacity: 1 !important;
        }

        /* Logo top-left */
        .logo-bottom {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            /* button reset (logo-bottom is a <button>) */
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            display: block;
            line-height: 0;
        }

        .logo-bottom.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .logo-bottom svg {
            width: 40px;
            height: 40px;
        }

        /* Scroll Progress Indicator — lives inside footer, grows from center */
        .scroll-progress {
            flex: 1;
            margin: 0 1.5rem;
            height: 4px;
            position: relative;
            align-self: center;
        }

        .scroll-progress-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            right: 50%;
            background: var(--black);
            opacity: 1;
            border-radius: 2px;
        }

        /* ==================== */
        /* FIXED BACKGROUND VIDEO (hero + about panels) */
        /* ==================== */
        /* Even white margin on every edge (6vh all round); the reel covers the
           box. Use the same oversize-to-cover trick as mobile so the 16:9 player
           fills the wider box instead of letterboxing onto black. */
        .fixed-video-bg {
            position: fixed;
            top: 6vh;
            right: 6vh;
            bottom: 6vh;
            left: 6vh;
            z-index: 0;
            overflow: hidden;
            border-radius: 4px;
            background: #0A0A0A;
            transition: opacity 0.6s ease;
        }

        .fixed-video-bg iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: max(100%, 177.78vh);
            height: max(100%, 56.25vw);
            transform: translate(-50%, -50%);
            border: none;
            pointer-events: none;
        }

        /* ==================== */
        /* HERO SECTION — logo only */
        /* ==================== */
        .hero-section {
            position: relative;
            min-width: 100vw;
            width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            scroll-snap-align: start;
            scroll-snap-stop: normal;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        /* Large centered logomark */
        .hero-wordmark {
            position: relative;
            z-index: 10;
            width: 37.5vw;
            max-width: 350px;
            height: auto;
            /* Source wordmark is purple; render white over the hero video (dark mode re-tints below) */
            filter: brightness(0) invert(1);
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }


        /* ==================== */
        /* PROJECT SECTIONS */
        /* ==================== */
        .project-section {
            position: relative;
            min-width: 100vw;
            width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            scroll-snap-align: start;
            scroll-snap-stop: normal;
            z-index: 2;
            background: var(--white);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .project-video-container {
            position: relative;
            height: 75vh;
            width: auto;
            max-width: 85vw;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 4px;
            background: #0A0A0A;
        }

        /* Cover the frame with a 16:9 player sized off the container height, plus
           ~10px overscan each edge so the editor's baked-in black borders get
           cropped out instead of showing on the outskirts. */
        .project-video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: calc(75vh + 20px);
            width: calc((75vh + 20px) * 16 / 9);
            border: none;
            pointer-events: none;
        }

        /* fare side artifact — base overscan already covers it */
        .project-video-crop iframe {
            transform: translate(-50%, -50%);
        }

        /* onco/wabi/pinch — shift up so the bigger black bar baked into the top
           of those clips is cropped off. */
        .project-video-crop-y iframe {
            transform: translate(-50%, calc(-50% - 8px));
        }

        /* Text overlay — dead center of viewport */
        .project-info {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .project-info a {
            pointer-events: auto;
        }

        .project-logo {
            width: clamp(120px, 15vw, 250px);
            height: auto;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
        }

        .project-section.in-view .project-logo {
            opacity: 1;
        }

        .project-client-link {
            text-decoration: none;
            color: inherit;
        }

        .project-client {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3.5rem, 7vw, 7rem);
            font-weight: 700;
            color: var(--white);
            line-height: 1;
            letter-spacing: -0.07em;
            text-transform: lowercase;
            text-align: center;
            margin: 0;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: inline-block;
        }


        .project-subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 300;
            color: var(--white);
            opacity: 0;
            line-height: 1.3;
            letter-spacing: -0.07em;
            text-transform: lowercase;
            margin: 0.05em 0 0 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.08s;
        }

        /* When section is in view, fade text in */
        .project-section.in-view .project-client {
            opacity: 1;
        }

        .project-section.in-view .project-subtitle {
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .nav { padding: 1.5rem; }
            .logo-bottom { top: 1.5rem; left: 1.5rem; }
            .menu-overlay { padding: 6rem 2.5rem 2.5rem; }
        }

        @media (max-width: 768px) {
            .nav { padding: 1.5rem; }
            .logo-bottom { top: 1.5rem; left: 1.5rem; }
            .logo-bottom svg { width: 32px; height: 32px; }
            .menu-toggle { width: 32px; height: 32px; }
            .plus-icon { width: 14px; height: 14px; }
            .menu-overlay { padding: 5rem 1.5rem 1.5rem; }

            /* Use dynamic viewport height — Safari ignores vh percentage chains */
            html { overflow: visible !important; overscroll-behavior-y: auto !important; }
            body { overflow: visible !important; overscroll-behavior-y: auto !important; }
            .scroll-container { height: 100dvh; overscroll-behavior-y: auto; }
            .project-section, .hero-section { height: 100dvh; }
            .fixed-video-bg { height: 100dvh; }
            .loading-overlay { height: 100dvh; }

            /* Vertical video cards on mobile - fill between nav and footer */
            .fixed-video-bg {
                position: fixed !important;
                width: 85% !important;
                height: calc(100dvh - 9rem) !important;
                top: 50% !important;
                left: 50% !important;
                transform: translate(-50%, -50%) !important;
                aspect-ratio: unset !important;
                border-radius: 4px !important;
            }

            .project-video-container {
                width: 85% !important;
                height: calc(100dvh - 9rem) !important;
                aspect-ratio: unset !important;
            }

            /* Scale 16:9 iframe to cover the tall container */
            .project-video-container iframe,
            .fixed-video-bg iframe {
                position: absolute !important;
                top: 50% !important;
                left: 50% !important;
                min-width: 100% !important;
                min-height: 100% !important;
                width: auto !important;
                height: 100% !important;
                transform: translate(-50%, -50%) !important;
            }

            /* Ensure width covers when container is narrow */
            @supports (width: max(1px, 1px)) {
                .project-video-container iframe,
                .fixed-video-bg iframe {
                    width: max(100%, 177.78vh) !important;
                    height: max(100%, 56.25vw) !important;
                }
            }

            /* Loading screen — put tagline in flex flow so bar+tagline center as a group */
            .loading-tagline {
                position: static;
                margin-top: 1.5rem;
                font-size: clamp(0.65rem, 3.5vw, 0.9rem);
                text-align: center;
                letter-spacing: -0.05em;
            }

            /* Force all chrome visible — IntersectionObserver unreliable on mobile */
            .nav, .logo-bottom, .site-footer {
                opacity: 1 !important;
                pointer-events: auto !important;
            }

            /* Project logos: always visible on mobile */
            .project-logo {
                opacity: 1 !important;
                width: clamp(100px, 40vw, 200px) !important;
            }
            .project-info { text-align: center; }

            /* Bigger menu links on mobile */
            .menu-link {
                font-size: clamp(3rem, 12vw, 5rem) !important;
            }
        }

        /* ==================== */
        /* SWIPE ARROWS (mobile only) */
        /* ==================== */
        .swipe-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            z-index: 1002;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            display: none;
        }

        .swipe-arrow svg {
            width: 100%;
            height: 100%;
            stroke: var(--black);
            stroke-width: 2;
            fill: none;
        }

        .swipe-arrow.left { left: 0.5rem; }
        .swipe-arrow.right { right: 0.5rem; }

        .swipe-arrow.visible {
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .swipe-arrow { display: block; }
        }

        /* Hide dot cursor on touch devices */
        @media (pointer: coarse) {
            .cursor { display: none !important; }
            * { cursor: auto !important; }
        }

        /* Disable blue gradient text effect on touch/mobile */
        @media (pointer: coarse) {
        }

        /* ==================== */
        /* DARK MODE OVERRIDES */
        /* ==================== */
        body.dark-mode {
            background-color: #0A0A0A !important;
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode ::selection {
            background: #FF4500 !important;
            color: #0A0A0A !important;
            -webkit-text-fill-color: #0A0A0A !important;
        }

        body.dark-mode .cursor { background: #FF4500 !important; }
        body.dark-mode .plus-icon span { background: #FF4500 !important; }

        body.dark-mode .menu-link {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }
        body.dark-mode .menu-link-lab { color: #A6FF8E !important; -webkit-text-fill-color: #A6FF8E; }
        body.dark-mode .menu-link-bond { color: var(--bond-blue) !important; -webkit-text-fill-color: var(--bond-blue); }

        body.dark-mode .logo-bottom svg path { fill: #FF4500 !important; }
        body.dark-mode .footer { background: #0A0A0A !important; }
        /* The project panels default to white; make them black in dark mode so the
           margins around each reel match the hero instead of flashing white. */
        body.dark-mode .project-section { background-color: #0A0A0A !important; }

        body.dark-mode .footer-left,
        body.dark-mode .footer-link,
        body.dark-mode .footer-link .char {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .footer-link::after { background: #FF4500 !important; }
        body.dark-mode .social-link { color: #FF4500 !important; }

        body.dark-mode .contact-email {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .clock-row {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

body.dark-mode .project-client {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .project-subtitle {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .scroll-progress-line { background: #FF4500 !important; }

        body.dark-mode .director-name {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .director-credit {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .case-study-link {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .case-study-link::after { background: #FF4500 !important; }

        body.dark-mode .hero-wordmark { filter: brightness(0) saturate(100%) invert(38%) sepia(99%) saturate(1200%) hue-rotate(358deg) brightness(103%) contrast(107%) !important; }

        /* ==================== */
        /* DARK MODE TOGGLE */
        /* ==================== */
        .dark-mode-toggle {
            display: flex;
            align-items: center;
            cursor: none;
        }

        .dark-mode-toggle input { display: none; }

        .toggle-track {
            width: 28px;
            height: 16px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            position: relative;
            transition: background 0.3s ease;
            cursor: none;
            display: block;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 12px;
            height: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode-toggle input:checked + .toggle-track {
            background: rgba(255, 69, 0, 0.8);
        }

        .dark-mode-toggle input:checked + .toggle-track::after {
            transform: translateX(12px);
            background: #FF4500;
        }

        /* ==================== */
        /* LOADING OVERLAY      */
        /* ==================== */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;

    <script>
        // ==================== //
        // REFERENCES
        // ==================== //
        // Touch detection — mirrors @media (pointer: coarse) exactly
        const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;

        const scrollContainer = document.getElementById('scrollContainer');
        const fixedVideoBg   = document.getElementById('fixedVideoBg');
        const logoBottom     = document.getElementById('logoBottom');
        const navEl          = document.querySelector('.nav');
        const menuToggle     = document.getElementById('menuToggle');
        const menuOverlay    = document.getElementById('menuOverlay');
        const progressLine   = document.getElementById('progressLine');
        const siteFooter     = document.querySelector('.site-footer');

        // ==================== //
        // LOGO — scroll back to start
        // ==================== //
        logoBottom.addEventListener('click', (e) => {
            e.preventDefault();
            scrollContainer.scrollTo({ left: 0, behavior: 'smooth' });
        });

        // ==================== //
        // MENU
        // ==================== //
        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            menuOverlay.classList.toggle('active');
        });

        menuOverlay.addEventListener('click', (e) => {
            if (e.target === menuOverlay) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        // ==================== //
        // MENU LINK GRADIENT SPREAD (desktop only)
        // (menu hover handled by CSS only)


        // ==================== //
        // CUSTOM CURSOR
        // ==================== //
        const cursor = document.getElementById('cursor');
        let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;
        let cursorScale = 1;
        window._cursorTargetScale = 1; // shared with other script blocks

        // Re-enforce cursor:none on bfcache restore (back/forward navigation)
        window.addEventListener('pageshow', function() {
            document.documentElement.style.setProperty('cursor', 'none', 'important');
            document.body.style.setProperty('cursor', 'none', 'important');
            const sc = document.getElementById('scrollContainer');
            if (sc) sc.style.setProperty('cursor', 'none', 'important');
        });

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        (function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.5;
            cursorY += (mouseY - cursorY) * 0.5;
            cursorScale += (window._cursorTargetScale - cursorScale) * 0.15;
            // transform is GPU-composited in Safari — much faster than left/top
            cursor.style.transform = `translate(${cursorX - 5}px, ${cursorY - 5}px) scale(${cursorScale})`;
            requestAnimationFrame(animateCursor);
        })();

        // ==================== //
        // WHEEL → HORIZONTAL NAV (free / continuous)
        // Vertical wheel maps straight to horizontal scroll — no panel snapping,
        // so it flows endlessly through the projects instead of skipping/locking.
        // ==================== //
        let isAnimating = false;
        const SNAP_MS = 420;

        function animateScrollTo(target, duration) {
            duration = duration || SNAP_MS;
            target = Math.max(0, target);
            const start = scrollContainer.scrollLeft;
            const dist = target - start;
            if (Math.abs(dist) < 1) return;
            isAnimating = true;
            const t0 = performance.now();
            (function step(now) {
                let t = (now - t0) / duration;
                if (t > 1) t = 1;
                const eased = 1 - Math.pow(1 - t, 3);
                scrollContainer.scrollLeft = start + dist * eased;
                if (t < 1) { requestAnimationFrame(step); }
                else { isAnimating = false; }
            })(performance.now());
        }
        window.snapHome = animateScrollTo; // shared with keyboard nav

        // Only intercept wheel on desktop — mobile touch handles its own scrolling
        const isTouchOnly = 'ontouchstart' in window && !window.matchMedia('(pointer: fine)').matches;
        let settleTimer = null;
        let lastDir = 1;                        // +1 forward, -1 back

        window.addEventListener('wheel', (e) => {
            if (isTouchOnly) return; // let mobile handle natively
            e.preventDefault();
            isAnimating = false;               // a manual scroll interrupts a key-nav animation
            if (e.deltaY) lastDir = e.deltaY > 0 ? 1 : -1;
            scrollContainer.scrollLeft += e.deltaY * 1.6;

            // Gentle settle: a beat after scrolling stops, ease softly to a project so
            // the viewer lands centered — but always in the direction of travel, so a
            // forward scroll never gets yanked back to the previous project.
            clearTimeout(settleTimer);
            settleTimer = setTimeout(function() {
                const vw = window.innerWidth;
                let n = Math.round(scrollContainer.scrollLeft / vw);
                const past = scrollContainer.scrollLeft - n * vw; // + = past the nearest panel
                if (lastDir > 0 && past >  vw * 0.12) n += 1;      // forward & in the back half -> go forward
                else if (lastDir < 0 && past < -vw * 0.12) n -= 1; // back & in the front half -> go back
                animateScrollTo(n * vw, 520);
            }, 180);
        }, { passive: false });

        // ==================== //
        // KEYBOARD NAV (horizontal)
        // ==================== //
        document.addEventListener('keydown', (e) => {
            if (menuOverlay.classList.contains('active')) return;
            const vw = window.innerWidth;
            const maxLeft = scrollContainer.scrollWidth - scrollContainer.clientWidth;
            const idx = Math.round(scrollContainer.scrollLeft / vw);
            if (e.key === 'ArrowRight' || e.key === 'PageDown') {
                e.preventDefault();
                animateScrollTo(Math.min(maxLeft, (idx + 1) * vw));
            } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                e.preventDefault();
                animateScrollTo(Math.max(0, (idx - 1) * vw));
            }
        });

        // ==================== //
        // PARALLAX TEXT (project-info sweeps in from scroll direction)
        // ==================== //
        const projectSections = document.querySelectorAll('.project-section');

        function updateParallax() {
            const scrollLeft = scrollContainer.scrollLeft;
            const vw = window.innerWidth;
            projectSections.forEach(section => {
                const panelLeft = section.offsetLeft;
                // Distance from viewport left edge: positive = to the right, negative = to the left
                const offset = panelLeft - scrollLeft;
                const info = section.querySelector('.project-info');
                if (info) {
                    if (window.innerWidth <= 768) {
                        info.style.transform = 'translateY(-50%)';
                    } else {
                        // Parallax factor: text moves at 65% of scroll speed
                        const tx = offset * 0.65;
                        info.style.transform = `translateY(-50%) translateX(${tx}px)`;
                    }
                }
            });
        }

        scrollContainer.addEventListener('scroll', updateParallax, { passive: true });
        window.addEventListener('resize', updateParallax);
        updateParallax(); // set initial positions

        // Progress bar — continuous, tied directly to scroll position
        function updateProgress() {
            const maxScroll = scrollContainer.scrollWidth - scrollContainer.clientWidth;
            const pct  = maxScroll > 0 ? scrollContainer.scrollLeft / maxScroll * 100 : 0;
            const half = pct / 2;
            progressLine.style.left  = (50 - half) + '%';
            progressLine.style.right = (50 - half) + '%';
        }
        scrollContainer.addEventListener('scroll', updateProgress, { passive: true });
        window.addEventListener('resize', updateProgress);
        updateProgress();

        // ==================== //
        // INTERSECTION OBSERVER (9 panels)
        // ==================== //
        const allSectionIds = [
            'heroSection',
            'project1', 'project2', 'project3', 'project4',
            'project5', 'project6', 'project7', 'project8'
        ];

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const id = entry.target.id;

                if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
                    const idx = allSectionIds.indexOf(id);

                    // Logo + nav: hidden on hero, visible on projects
                    const onHero = id === 'heroSection';
                    logoBottom.classList.toggle('visible', !onHero);
                    navEl.classList.toggle('visible', !onHero);
                    siteFooter.classList.toggle('visible', !onHero);

                    // Hero reel: show on hero panel only
                    fixedVideoBg.style.opacity = onHero ? '1' : '0';

                    // Project in-view class
                    if (id.startsWith('project')) {
                        entry.target.classList.add('in-view');
                    }
                } else if (!entry.isIntersecting) {
                    if (id.startsWith('project')) {
                        entry.target.classList.remove('in-view');
                    }
                }
            });
        }, {
            root: scrollContainer,
            threshold: 0.5
        });

        allSectionIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) observer.observe(el);
        });

        // ==================== //
        // PROJECT ANIMATIONS (Motion)
        // ==================== //
        const { animate, inView } = Motion;

        document.querySelectorAll('.project-section').forEach((section) => {
            const client   = section.querySelector('.project-client');
            const subtitle = section.querySelector('.project-subtitle');

            inView(section, () => {
                if (client)   animate(client,   { opacity: [0, 1]   }, { duration: 0.7, easing: [0.22, 1, 0.36, 1] });
                if (subtitle) animate(subtitle, { opacity: [0, 0.7] }, { duration: 0.7, delay: 0.12, easing: [0.22, 1, 0.36, 1] });

                return () => {
                    if (client)   animate(client,   { opacity: 0 }, { duration: 0.3 });
                    if (subtitle) animate(subtitle, { opacity: 0 }, { duration: 0.3 });
                };
            }, { amount: 0.5 });
        });
    </script>

    <script>
    // ==================== //
    // ==================== //
    // MOBILE: fix video dimensions
    // ==================== //
    function fixMobileVideos() {
        if (window.innerWidth > 768) return;
        // Use the section's actual rendered height for pixel accuracy
        const h = document.querySelector('.project-section')
                    ? document.querySelector('.project-section').offsetHeight
                    : window.innerHeight;
        const w = Math.ceil(h * 16 / 9) + 2;
        document.querySelectorAll('.project-video-container iframe, .fixed-video-bg iframe').forEach(function(iframe) {
            iframe.style.width     = w + 'px';
            iframe.style.height    = h + 'px';
            iframe.style.minWidth  = 'unset';
            iframe.style.minHeight = 'unset';
            // Reset any per-iframe inline transform so CSS centering takes over
            iframe.style.transform = 'translate(-50%, -50%)';
        });
    }
    fixMobileVideos();
    window.addEventListener('resize', fixMobileVideos);

    // ==================== //
    // LAZY LOADER
    // Each project iframe holds its Vimeo URL in data-src and only swaps it into
    // src as its panel enters the viewport — so on first load just the hero bg
    // player fires a network chain, not all nine. Panels that scroll more than
    // 400px past the viewport are unloaded again (src cleared) so off-screen
    // background videos stop autoplaying. The panel keeps its background colour
    // and aspect-ratio box throughout, so loading/unloading never shifts the
    // layout (CLS stays 0).
    // ==================== //
    (function() {
        const sc = document.getElementById('scrollContainer');

        function load(iframe) {
            if (iframe && !iframe.getAttribute('src') && iframe.dataset.src) {
                iframe.src = iframe.dataset.src;
            }
        }
        function unload(iframe) {
            if (iframe && iframe.getAttribute('src')) {
                iframe.dataset.src = iframe.getAttribute('src');
                iframe.removeAttribute('src');
            }
        }

        // Load a panel the moment it touches the viewport edge.
        const loadObserver = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) load(entry.target.querySelector('iframe'));
            });
        }, { root: sc, rootMargin: '0px 200%', threshold: 0 });

        // Unload only once a panel sits more than 400px outside the viewport.
        // The 0px/400px gap is hysteresis so a panel parked near the edge can't
        // thrash between load and unload.
        const unloadObserver = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (!entry.isIntersecting) unload(entry.target.querySelector('iframe'));
            });
        }, { root: sc, rootMargin: '0px 300%', threshold: 0 });

        document.querySelectorAll('.project-section').forEach(function(section) {
            if (section.querySelector('iframe[data-src]')) {
                loadObserver.observe(section);
                unloadObserver.observe(section);
            }
        });
    })();

    // ==================== //
    // LOADING SCREEN
    // Waits for the hero video to actually start playing (via Vimeo postMessage)
    // before dismissing. Falls back after 5s if postMessage never fires.
    // ==================== //
    (function() {
        const overlay    = document.getElementById('loadingOverlay');
        const barFill    = document.getElementById('loadingBarFill');
        const content    = document.getElementById('loadingContent');
        const tagline    = document.getElementById('loadingTagline');
        // Only the eager iframe (hero bg) is tracked for the progress bar;
        // the project players load lazily and shouldn't gate the intro screen.
        const eagerIframes = document.querySelectorAll('iframe[src*="vimeo"]');
        const total      = eagerIframes.length;
        let iframesLoaded = 0;
        let videoStarted  = false;
        let completed     = false;

        // Loading screen removed — reveal the page immediately so projects show
        // and load as fast as possible (no "relentlessly efficient" gate).
        if (overlay) overlay.style.display = 'none';
        return;

        function setProgress(pct) {
            barFill.style.width = pct + '%';
        }

        function runSequence() {
            if (completed) return;
            completed = true;
            setProgress(100);
            setTimeout(() => {
                content.classList.add('fade-out');
                setTimeout(() => {
                    tagline.classList.add('visible');
                    setTimeout(() => {
                        tagline.classList.remove('visible');
                        setTimeout(() => { overlay.classList.add('hidden'); }, 700);
                    }, 1500);
                }, 500);
            }, 400);
        }

        function checkReady() {
            if (iframesLoaded >= total && videoStarted) runSequence();
        }

        // Track iframe HTML loads for progress bar (fills to 80%)
        eagerIframes.forEach(function(iframe) {
            iframe.addEventListener('load', function() {
                iframesLoaded++;
                setProgress(Math.round((iframesLoaded / total) * 80));
                checkReady();
            });
        });

        // Vimeo postMessage: subscribe to play event on ready, dismiss when play fires
        window.addEventListener('message', function(e) {
            if (e.origin !== 'https://player.vimeo.com') return;
            try {
                const data = JSON.parse(e.data);
                if (data.event === 'ready') {
                    eagerIframes.forEach(function(iframe) {
                        if (iframe.contentWindow) {
                            iframe.contentWindow.postMessage(
                                JSON.stringify({ method: 'addEventListener', value: 'play' }),
                                'https://player.vimeo.com'
                            );
                        }
                    });
                }
                if (data.event === 'play' && !videoStarted) {
                    videoStarted = true;
                    setProgress(100);
                    checkReady();
                }
            } catch(err) {}
        });

        // Fallback: if Vimeo play event never fires, proceed after 5s
        setTimeout(function() {
            if (!videoStarted) { videoStarted = true; checkReady(); }
        }, 5000);

        // Hard fallback: 10s max
        setTimeout(function() {
            if (!completed) runSequence();
        }, 10000);
    })();
    </script>

    <script>
    // ==================== //
    // SCROLL POSITION RESTORE
    // Save scroll position before navigating away so back-button
    // returns to the same project panel.
    // ==================== //
    (function() {
        var sc = document.getElementById('scrollContainer');
        if (!sc) return;

        // Save scroll position continuously
        sc.addEventListener('scroll', function() {
            sessionStorage.setItem('homeScrollLeft', sc.scrollLeft);
        }, { passive: true });

        // Restore on page load (back-button or reload)
        var saved = sessionStorage.getItem('homeScrollLeft');
        if (saved) {
            // Instant scroll (no smooth) to avoid visual slide
            sc.scrollLeft = parseInt(saved, 10);
        }
    })();
    </script>

    <script>
    // ==================== //
    // SWIPE ARROW INDICATORS (mobile only)
    // Show right arrow when there are more panels to the right,
    // left arrow when there are panels to the left.
    // ==================== //
    (function() {
        var sc = document.getElementById('scrollContainer');
        var leftArrow = document.getElementById('swipeLeft');
        var rightArrow = document.getElementById('swipeRight');
        if (!sc || !leftArrow || !rightArrow) return;

        function updateArrows() {
            if (window.innerWidth > 768) {
                leftArrow.classList.remove('visible');
                rightArrow.classList.remove('visible');
                return;
            }
            var left = sc.scrollLeft;
            var maxLeft = sc.scrollWidth - sc.clientWidth;
            // Tolerance for snap rounding
            var atStart = left <= 4;
            var atEnd = left >= maxLeft - 4;
            leftArrow.classList.toggle('visible', !atStart);
            rightArrow.classList.toggle('visible', !atEnd);
        }

        sc.addEventListener('scroll', updateArrows, { passive: true });
        window.addEventListener('resize', updateArrows);
        // Initial state (after a tick so scroll-restore runs first)
        setTimeout(updateArrows, 100);
    })();
    </script>

    <script>

    (function() {

            var existing = document.getElementById('no-native-cursor');
            if (existing) existing.remove();
            var style = document.createElement('style');
            style.id = 'no-native-cursor';
            style.textContent = 'html, html *, body, body * { cursor: none !important; }';
            document.head.appendChild(style);
        }
        enforceNoCursor();
        window.addEventListener('pageshow', function(e) {
            enforceNoCursor();
            var cursor = document.getElementById('cursor');
            if (cursor && !('ontouchstart' in window)) {
                cursor.style.display = 'block';
            }
        });
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) enforceNoCursor();
        });
    })();

    <!-- Custom click cursor: knockout label box over clickable elements -->
    <script>
    (function(){
      try {
        if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return;
        var st = document.createElement('style');
        st.textContent = '#clickCursor{position:fixed;text-transform:uppercase;left:-200px;top:-200px;transform:translate(-50%,-50%) scale(.7);opacity:0;pointer-events:none;z-index:10050;mix-blend-mode:difference;transition:opacity .25s ease,transform .3s cubic-bezier(.2,.8,.2,1);will-change:transform,left,top,opacity}#clickCursor.show{opacity:1;transform:translate(-50%,-50%) scale(1)}body.click-cursor-active .cursor{opacity:0 !important}';
        document.head.appendChild(st);
        var box = document.createElement('div');
        box.id = 'clickCursor';
        box.setAttribute('aria-hidden','true');
        document.body.appendChild(box);
        function makeBox(label){
          var w = Math.max(56, Math.round(label.length * 8.6 + 28)), h = 26;
          return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg"><defs><mask id="clickCursorMask"><rect width="'+w+'" height="'+h+'" rx="5" fill="#fff"/><text x="'+(w/2)+'" y="14" text-anchor="middle" dominant-baseline="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="12" letter-spacing="-0.2" fill="#000">'+label+'</text></mask></defs><rect width="'+w+'" height="'+h+'" rx="5" fill="#fff" mask="url(#clickCursorMask)"/></svg>';
        }
        var current = '';
        function setLabel(l){ if (l === current) return; current = l; box.innerHTML = makeBox(l); }
        setLabel('CLICK');
        function menuOpen(){ return !!document.querySelector('.menu-overlay.active'); }
        function hide(){ box.classList.remove('show'); document.body.classList.remove('click-cursor-active'); }
        function show(el){
          if (menuOpen()) { hide(); return; }
          var lbl = (el.getAttribute && el.getAttribute('data-cursor')) || 'CLICK';
          setLabel(String(lbl).toUpperCase());
          box.classList.add('show');
          document.body.classList.add('click-cursor-active');
        }
        document.addEventListener('mousemove', function(e){
          box.style.left = e.clientX + 'px'; box.style.top = e.clientY + 'px';
          if (menuOpen() && box.classList.contains('show')) hide();
        }, {passive:true});
        var sel = 'a[href], button, label, input, select, textarea, summary, [role=button], [onclick], .cs-ctrl, .dark-mode-toggle, .logo-bottom, .project-client-link, [data-cursor]';
        function hit(t){ if (!t || !t.closest) return null; if (t.closest('.site-footer, .footer, .lab-footer')) return null; if (t.closest('.cs-video-controls') && !t.closest('.cs-ctrl')) return null; return t.closest(sel); }
        document.addEventListener('mouseover', function(e){ var el = hit(e.target); if (el) show(el); }, {passive:true});
        document.addEventListener('mouseout', function(e){ if (hit(e.target) && !hit(e.relatedTarget)) hide(); }, {passive:true});
      } catch(err){}
    })();
    </script>
