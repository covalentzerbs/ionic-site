    <style>
        /* ==================== */
        /* CSS VARIABLES */
        /* ==================== */
        :root {
            --black: #0A0A0A;
            --white: #FFFFFF;
            --gray: #6B7280;
            --bond-blue: #5979e9;
        }

        /* ==================== */
        /* RESET & BASE */
        /* ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        ::selection {
            background: var(--black);
            color: var(--white);
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--white);
            color: var(--black);
            text-transform: lowercase;
            letter-spacing: -0.07em;
        }

        /* ==================== */
        /* CUSTOM CURSOR */
        /* ==================== */
        .cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--white);
            pointer-events: none;
            z-index: 10001;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
        }

        .cursor.hidden {
            opacity: 0;
        }

        /* ==================== */
        /* NAVIGATION - PLUS MENU */
        /* ==================== */
        .nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 2rem;
            z-index: 1000;
        }

        .menu-toggle {
            width: 40px;
            height: 40px;
            cursor: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-toggle.active {
            transform: rotate(45deg);
        }

        .plus-icon {
            width: 18px;
            height: 18px;
            position: relative;
        }

        .plus-icon span {
            display: block;
            position: absolute;
            width: 100%;
            height: 2px;
            background: #7c5cfc;
            top: 50%;
            left: 0;
            transition: all 0.3s ease;
        }

        .plus-icon span:first-child {
            transform: translateY(-50%) rotate(90deg);
        }

        .plus-icon span:last-child {
            transform: translateY(-50%);
        }

        /* ==================== */
        /* MENU OVERLAY */
        /* ==================== */
        .menu-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding: 3rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            pointer-events: auto;
            opacity: 1;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.3);
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .menu-link {
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 500;
            color: var(--black);
            text-decoration: none;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.07em;
            line-height: 1.05;
        }

        .menu-overlay.active .menu-link {
            opacity: 0.6;
            transform: translateX(0);
        }

        .menu-overlay.active .menu-link:nth-child(1) { transition-delay: 0.05s; }
        .menu-overlay.active .menu-link:nth-child(2) { transition-delay: 0.1s; }
        .menu-overlay.active .menu-link:nth-child(3) { transition-delay: 0.15s; }
        .menu-overlay.active .menu-link:nth-child(4) { transition-delay: 0.25s; }
        .menu-overlay.active .menu-link:nth-child(5) { transition-delay: 0.3s; }

        
        .menu-spacer {
            height: 0.8em;
        }

        .menu-socials {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-top: 1.5rem;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-overlay.active .menu-socials {
            opacity: 0.5;
            transform: translateX(0);
            transition-delay: 0.3s;
        }

        .menu-link-lab {
            color: #A6FF8E;
        }

        .menu-overlay.active .menu-link-lab {
            opacity: 0.5 !important;
            transition: opacity 0.12s ease !important;
        }

        .menu-overlay.active .menu-link-lab:hover {
            opacity: 1 !important;
            transition: opacity 0.12s ease !important;
        }

        .menu-link-bond {
            font-family: 'Satoshi', sans-serif;
            font-weight: 500;
            letter-spacing: -0.03em;
            color: var(--bond-blue);
                    text-transform: none;
        }

        .menu-link:hover {
            opacity: 1 !important;
        }

        .menu-link {
            position: relative;
            display: inline-block;
        }

        .menu-link-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #5979e9, #7B93FF, #5979e9, #3A5BD4);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
            mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
            opacity: 0;
            transition: opacity 0s;
        }

        .menu-link:hover .menu-link-gradient {
            opacity: 1;
        }


        /* ==================== */
        /* MAIN CONTENT LAYOUT */
        /* ==================== */
        .page-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 3rem;
            padding: 6rem 3rem 3rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* ==================== */
        /* VIDEO PLAYER SECTION */
        /* ==================== */
        .video-section {
            position: relative;
        }

        .cs-video-hero {
            position: relative;
            width: 100%;
        }

        .cs-video-ratio {
            position: relative;
            background: transparent;
            border-radius: 2px;
            overflow: hidden;
        }

        .cs-video-ratio iframe {
            display: block;
            width: 100%;
            border: none;
        }

        /* Click layer for play/pause */
        .cs-video-click-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: none;
            background: transparent;
        }

        /* ==================== */
        /* CUSTOM VIDEO CONTROLS */
        /* ==================== */
        .cs-video-controls {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 24px;
            padding: 0 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            color: var(--white);
            z-index: 20;
            opacity: 1;
            transform: translateY(0);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }

        /* Auto-hide when playing */
        .cs-video-hero.cs-playing .cs-video-controls {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .cs-video-hero.cs-playing.cs-hover .cs-video-controls {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Idle state — controls slide down */
        .cs-video-hero.cs-idle .cs-video-controls {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        /* When mouse moves again — snap back up */
        .cs-video-hero:not(.cs-idle) .cs-video-controls {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s ease;
        }

        /* Hide cursor when idle */
        .cs-video-hero.cs-idle {
            cursor: none !important;
        }

        .cs-video-hero.cs-idle .cs-video-click-layer {
            cursor: none !important;
        }

        /* Control buttons */
        .cs-ctrl {
            border: none;
            background: transparent;
            color: inherit;
            cursor: none;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 0.3s ease;
        }

        .cs-ctrl:hover {
            filter: brightness(0) saturate(100%) invert(47%) sepia(98%) saturate(456%) hue-rotate(194deg) brightness(95%) contrast(91%);
        }

        .cs-ctrl-icon {
            width: 16px;
            height: auto;
            pointer-events: none;
            transition: filter 0.3s ease;
        }

        .cs-icon-play { display: inline-block; }
        .cs-icon-pause { display: none; }

        .cs-video-hero.cs-playing .cs-icon-play { display: none; }
        .cs-video-hero.cs-playing .cs-icon-pause { display: inline-block; }

        /* Progress bar */
        .cs-progress {
            flex: 1;
            cursor: none;
            padding: 10px 0;
        }

        .cs-progress-track {
            position: relative;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.5);
            border-radius: 999px;
            overflow: hidden;
        }

        .cs-progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0%;
            background: var(--white);
            border-radius: 999px;
        }

        /* Timecode */
        .cs-time {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.07em;
            font-size: 12px;
            opacity: 1;
            white-space: nowrap;
        }

        /* ==================== */
        /* FULLSCREEN MODE */
        /* ==================== */
        /* Restore cursor in fullscreen */
        :fullscreen, :fullscreen * {
            cursor: auto !important;
        }

        :fullscreen .cursor {
            display: none !important;
        }

        .cs-video-ratio:fullscreen {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--black);
            width: 100vw;
            height: 100vh;
        }

        .cs-video-ratio:fullscreen #vimeoWrapper {
            width: 100%;
            height: 100%;
            padding-top: 0 !important;
            position: relative !important;
        }

        .cs-video-ratio:fullscreen #vimeoWrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .cs-video-ratio:fullscreen .cs-video-controls {
            position: fixed;
            bottom: 40px;
            left: 60px;
            right: 60px;
            padding: 0;
        }

        /* Always show controls in fullscreen on hover */
        .cs-video-ratio:fullscreen .cs-video-hero.cs-playing .cs-video-controls {
            opacity: 0;
            pointer-events: none;
        }

        .cs-video-ratio:fullscreen:hover .cs-video-controls {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        .cs-video-ratio:fullscreen .cs-video-hero:not(.cs-idle) .cs-video-controls {
            opacity: 1 !important;
            transform: translateY(0) !important;
            pointer-events: auto !important;
        }

        .cs-video-ratio:fullscreen .cs-video-hero.cs-idle .cs-video-controls {
            opacity: 0 !important;
            transform: translateY(20px) !important;
            pointer-events: none !important;
        }

        /* Hide system cursor when idle in fullscreen */
        .cs-video-ratio:fullscreen .cs-video-hero.cs-idle,
        .cs-video-ratio:fullscreen .cs-video-hero.cs-idle * {
            cursor: none !important;
        }

        /* ==================== */
        /* PROJECT INFO SECTION */
        /* ==================== */
        .project-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 0;
        }

        .project-meta {
            margin-bottom: 1.5rem;
        }

        .director-credit {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.07em;
            margin-bottom: 1rem;
        }

        .case-study-link {
            display: inline-block;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--black);
            text-decoration: none;
            position: relative;
        }

        .case-study-link::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            right: -0.15em;
            bottom: -0.15em;
            background: linear-gradient(90deg, #5979e9, #7B93FF, #5979e9, #3A5BD4);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
            mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
        }

        /* Underline */
        .case-study-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--black);
            transform-origin: left;
        }

        /* ==================== */
        /* FOOTER */
        /* ==================== */
        .footer {
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1001;
            opacity: 0.5;
            background: var(--white);
        }

        .footer-left {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--black);
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .footer-link {
            font-size: 0.75rem;
            color: var(--black);
            text-decoration: none;
            position: relative;
        }

        .footer-link .char {
            display: inline-block;
            color: var(--black);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .footer-link .char.infected {
            background: linear-gradient(90deg, #4A6CF7, #6B8CFF, #4A6CF7);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 2s ease infinite;
        }

        .footer-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--black);
            transition: background 0.4s ease;
        }

        .footer-link.fully-infected::after {
            background: linear-gradient(90deg, #4A6CF7, #6B8CFF, #4A6CF7);
            background-size: 200% 100%;
            animation: gradientShift 2s ease infinite;
        }

        .social-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .social-link:hover {
            opacity: 1;
        }

        .social-link svg {
            width: 18px;
            height: 16px;
            fill: var(--black);
        }

        /* ==================== */
        /* LOGO BOTTOM RIGHT */
        /* ==================== */
        .logo-bottom {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        .logo-bottom:hover {
            opacity: 0.7;
        }

        .logo-bottom svg {
            width: 40px;
            height: 40px;
        }

        .logo-bottom svg path {
            fill: #7c5cfc;
        }

        /* ==================== */
        /* RESPONSIVE */
        /* ==================== */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
                padding: 5rem 2.5rem 2.5rem;
            }

            .project-info {
                padding: 1rem 0;
            }

            .nav {
                padding: 1.5rem;
            }

            .logo-bottom {
                top: 1.5rem;
                left: 1.5rem;
            }

            .footer {
                padding: 2rem 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 4rem 1.5rem 1.5rem;
            }

            .nav {
                padding: 1.5rem;
            }

            .logo-bottom {
                top: 1.5rem;
                left: 1.5rem;
            }

            .logo-bottom svg {
                width: 32px;
                height: 32px;
            }

            .footer {
                padding: 1.5rem;
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .footer-right {
                flex-direction: column;
                gap: 1rem;
            }

            .cs-video-controls {
                padding: 0 16px;
                bottom: 16px;
            }
        }
        /* ==================== */
        /* DARK MODE OVERRIDES */
        /* ==================== */
        body.dark-mode {
            background-color: #1A1A2E !important;
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode ::selection {
            background: #7c5cfc !important;
            color: #1A1A2E !important;
            -webkit-text-fill-color: #1A1A2E !important;
        }

        body.dark-mode .cursor {
            background: #7c5cfc !important;
        }

        body.dark-mode .plus-icon span {
            background: #7c5cfc !important;
        }

        body.dark-mode .menu-link {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }
        body.dark-mode .menu-link-lab { color: #A6FF8E !important; -webkit-text-fill-color: #A6FF8E; }
        body.dark-mode .menu-link-bond { color: var(--bond-blue) !important; -webkit-text-fill-color: var(--bond-blue); }

        body.dark-mode .logo-bottom svg path {
            fill: #7c5cfc !important;
        }

        body.dark-mode .footer {
            background: #1A1A2E !important;
        }

        body.dark-mode .footer-left,
        body.dark-mode .footer-link,
        body.dark-mode .footer-link .char {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode .footer-link::after {
            background: #7c5cfc !important;
        }

        body.dark-mode .social-link svg {
            fill: #7c5cfc !important;
        }

        body.dark-mode .contact-email {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode .clock-row {
            color: #7c5cfc !important;

        }

        body.dark-mode .about-text {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode .project-client {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode .project-subtitle {
            color: #7c5cfc !important;

        }

        body.dark-mode .scroll-progress-segment {

        }

        /* ==================== */
        /* DARK MODE TOGGLE */
        /* ==================== */
        .dark-mode-toggle {
            
            
            
            cursor: none;
        }

        .dark-mode-toggle input {
            display: none;
        }

        .toggle-track {
            width: 28px;
            height: 16px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            position: relative;
            transition: background 0.3s ease;
            cursor: none;
            display: block;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 12px;
            height: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode-toggle input:checked + .toggle-track {
            background: rgba(124, 92, 252, 0.8);
        }

        .dark-mode-toggle input:checked + .toggle-track::after {
            transform: translateX(12px);
            background: #7c5cfc;
        }
        /* SOCIAL ICON BRAND HOVER — high-saturation feedback */
        .social-link {
            transition: color 0.18s ease, opacity 0.18s ease, transform 0.18s ease, filter 0.18s ease;
            transform-origin: center;
        }
        .social-link[aria-label="Instagram"]:hover {
            color: #E1306C !important;
            opacity: 1 !important;
            transform: scale(1.22);
            filter: drop-shadow(0 0 10px rgba(225, 48, 108, 0.55)) saturate(1.4);
        }
        .social-link[aria-label="LinkedIn"]:hover {
            color: #0A66C2 !important;
            opacity: 1 !important;
            transform: scale(1.22);
            filter: drop-shadow(0 0 10px rgba(10, 102, 194, 0.6)) saturate(1.4);
        }
        .social-link.social-link-ionic:hover {
            color: #714BDD !important;
            opacity: 1 !important;
            transform: scale(1.22);
            filter: drop-shadow(0 0 10px rgba(113, 75, 221, 0.6)) saturate(1.4);
        }
        /* Lift the muted .menu-socials row so the hovered icon shows full color */
        .menu-overlay.active .menu-socials:hover { opacity: 1 !important; }
        /* BRANDED SCROLLBAR — replaces the native macOS overlay scrollbar
           with a thin Bond-Blue line on the right edge of the page. */
        html {
            scrollbar-width: thin;
            scrollbar-color: rgba(89, 121, 233, 0.45) transparent;
        }
        html::-webkit-scrollbar {
            width: 6px;
        }
        html::-webkit-scrollbar-track {
            background: transparent;
        }
        html::-webkit-scrollbar-thumb {
            background: rgba(89, 121, 233, 0.35);
            border-radius: 3px;
            border: 1px solid transparent;
            background-clip: padding-box;
            transition: background-color 0.2s ease;
        }
        html::-webkit-scrollbar-thumb:hover {
            background: var(--bond-blue, #5979e9);
        }

        /* Dark mode: paint the root element so the canvas stays dark while
           scrolling. body height:100% means its background does not reach the
           canvas once the page scrolls, leaving the root white. */
        html:has(body.dark-mode) {
            background-color: #0A0A0A;
        }

        /* Bulletproof dark bg: paint the page wrapper directly. A normal element's
           background always paints, unlike body->canvas propagation which fails on
           scrolling pages and was leaving the project page white in dark mode. */
        body.dark-mode .page-wrapper { background-color: #0A0A0A; }

        /* ---- project page polish ---- */
        /* Smooth the progress bar between Vimeo's ~4x/sec timeupdate events
           (was jumping in discrete steps). */
        .cs-progress-fill { transition: width 0.25s linear; }

        /* Dark mode: recolour the white player chrome to the orange accent. */
        body.dark-mode .cs-progress-fill { background-color: #7c5cfc !important; }
        body.dark-mode .cs-progress-track { background-color: rgba(124, 92, 252, 0.35) !important; }
        body.dark-mode .cs-ctrl-icon {
            filter: brightness(0) saturate(100%) invert(48%) sepia(99%) saturate(1900%) hue-rotate(359deg) brightness(102%) contrast(105%);
        }
        /* volume control: mute toggle + pop-up gauge, left of the fullscreen button */
        .cs-vol { position: relative; display: flex; align-items: center; }
        .cs-vol-btn .cs-vol-ic { display: none; width: 16px; height: 16px; }
        .cs-vol-btn .cs-vol-on { display: block; }
        .cs-vol.muted .cs-vol-on { display: none; }
        .cs-vol.muted .cs-vol-off { display: block; }
        .cs-vol-gauge { position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); opacity: 0; pointer-events: none; transition: opacity 0.18s ease; background: rgba(20,20,20,0.72); border-radius: 999px; padding: 12px 0; }
        .cs-vol.show-gauge .cs-vol-gauge { opacity: 1; pointer-events: auto; }
        .cs-vol-track { width: 4px; height: 70px; margin: 0 13px; background: rgba(255,255,255,0.3); border-radius: 999px; position: relative; cursor: none; }
        .cs-vol-fill { position: absolute; left: 0; right: 0; bottom: 0; height: 100%; background: #fff; border-radius: 999px; }
        body.dark-mode .cs-vol-ic { filter: brightness(0) saturate(100%) invert(48%) sepia(99%) saturate(1900%) hue-rotate(359deg) brightness(102%) contrast(105%); }
        body.dark-mode .cs-vol-fill { background-color: #7c5cfc; }
        body.dark-mode .cs-vol-track { background-color: rgba(124, 92, 252,0.35); }

        /* Desktop: fit the entire project page in one viewport so the footer is
           visible under the player with no scroll. The video derives its height
           from its width, so we cap the width by the available height too. */
        @media (min-width: 1025px) {

            .footer { padding: 1.25rem 3rem; }

    <script>
        // ==================== //
        // CUSTOM CURSOR
        // ==================== //
        const cursor = document.getElementById('cursor');
        const vimeoWrapperEl = document.getElementById('vimeoWrapper');

        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.35;
            cursorY += (mouseY - cursorY) * 0.35;
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Hide cursor when over video area (Vimeo has its own cursor)
        vimeoWrapperEl.addEventListener('mouseenter', () => {
            cursor.classList.add('hidden');
        });

        vimeoWrapperEl.addEventListener('mouseleave', () => {
            cursor.classList.remove('hidden');
        });

        // ==================== //
        // MENU TOGGLE
        // ==================== //
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            menuOverlay.classList.toggle('active');
        });

        menuOverlay.addEventListener('click', (e) => {
            if (e.target === menuOverlay) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        // ==================== //
        // MENU LINK GRADIENT SPREAD EFFECT
        // ==================== //
        // (menu hover handled by CSS only)

        // ==================== //
        // VIMEO PLAYER CONTROLS
        // ==================== //
        const iframe = document.getElementById('vimeoPlayer');
        const player = new Vimeo.Player(iframe);
        const vimeoWrapper = document.getElementById('vimeoWrapper');

        const videoHero = document.getElementById('videoHero');
        const videoClickLayer = document.getElementById('videoClickLayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let isPlaying = false;
        let videoDuration = 0;

        // Format time as MM:SS
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Get video duration and set aspect ratio
        player.getDuration().then(duration => {
            videoDuration = duration;
            durationEl.textContent = formatTime(duration);
        });

        // Get actual video dimensions and set aspect ratio
        Promise.all([player.getVideoWidth(), player.getVideoHeight()]).then(([width, height]) => {
            const aspectRatio = (height / width) * 100;
            vimeoWrapper.style.paddingTop = aspectRatio + '%';
        });

        // Play/Pause toggle
        function togglePlay() {
            if (isPlaying) {
                player.pause();
            } else {
                player.play();
            }
        }

        videoClickLayer.addEventListener('click', togglePlay);
        playPauseBtn.addEventListener('click', togglePlay);

        // Update playing state
        player.on('play', () => {
            isPlaying = true;
            videoHero.classList.add('cs-playing'); playPauseBtn.setAttribute('data-cursor','pause');
        });

        player.on('pause', () => {
            isPlaying = false;
            videoHero.classList.remove('cs-playing'); playPauseBtn.setAttribute('data-cursor','play');
        });

        // Update progress bar
        player.on('timeupdate', (data) => {
            const percent = (data.seconds / videoDuration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(data.seconds);
        });

        // Seek on progress bar click
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const seekTime = percent * videoDuration;
            player.setCurrentTime(seekTime);
        });

        // Fullscreen toggle - fullscreen the container to keep custom controls
        const videoRatio = document.getElementById('videoRatio');

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                videoRatio.requestFullscreen();
            }
        });

        // Volume control: mute toggle + draggable pop-up gauge
        const csVol = document.getElementById('csVol');
        const csVolBtn = document.getElementById('csVolBtn');
        const csVolTrack = document.getElementById('csVolTrack');
        const csVolFill = document.getElementById('csVolFill');
        let csVolume = 1, csMuted = false, csVolDragging = false, csVolHideT = null;
        function csRenderVol() { const off = csMuted || csVolume === 0; csVol.classList.toggle('muted', off); csVolFill.style.height = ((off ? 0 : csVolume) * 100) + '%'; csVolBtn.setAttribute('data-cursor', off ? 'unmute' : 'mute'); }
        function csApplyVol() { const off = csMuted || csVolume === 0; try { if (player.setMuted) player.setMuted(off); } catch (e) {} try { player.setVolume(off ? 0 : csVolume).catch(() => {}); } catch (e) {} csRenderVol(); }
        function csShowGauge() { clearTimeout(csVolHideT); csVol.classList.add('show-gauge'); }
        function csHideGaugeSoon() { clearTimeout(csVolHideT); csVolHideT = setTimeout(() => { if (!csVolDragging) csVol.classList.remove('show-gauge'); }, 500); }
        function csVolFromY(e) { const r = csVolTrack.getBoundingClientRect(); return Math.max(0, Math.min(1, 1 - (e.clientY - r.top) / r.height)); }
        csVolBtn.addEventListener('click', (e) => { e.stopPropagation(); csMuted = !csMuted; if (!csMuted && csVolume === 0) csVolume = 1; csApplyVol(); csShowGauge(); });
        csVol.addEventListener('mouseenter', csShowGauge);
        csVol.addEventListener('mouseleave', csHideGaugeSoon);
        csVolTrack.addEventListener('mousedown', (e) => { e.preventDefault(); e.stopPropagation(); csVolDragging = true; const v = csVolFromY(e); csVolume = v; csMuted = (v === 0); csApplyVol(); });
        document.addEventListener('mousemove', (e) => { if (csVolDragging) { const v = csVolFromY(e); csVolume = v; csMuted = (v === 0); csApplyVol(); } });
        document.addEventListener('mouseup', () => { csVolDragging = false; });
        player.ready().then(() => player.getVolume()).then((v) => { if (typeof v === 'number') { csVolume = v > 0 ? v : 1; csMuted = (v === 0); } csRenderVol(); }).catch(() => {});
        csRenderVol();

        // Hover detection for controls visibility
        videoHero.addEventListener('mouseenter', () => {
            videoHero.classList.add('cs-hover');
        });

        videoHero.addEventListener('mouseleave', () => {
            videoHero.classList.remove('cs-hover');
            videoHero.classList.remove('cs-idle');
            clearTimeout(idleTimeout);
        });

        // Idle detection — hide controls after 1s of no mouse movement
        let idleTimeout;

        videoHero.addEventListener('mousemove', () => {
            videoHero.classList.remove('cs-idle');
            clearTimeout(idleTimeout);
            if (isPlaying) {
                idleTimeout = setTimeout(() => {
                    videoHero.classList.add('cs-idle');
                }, 1000);
            }
        });

        // Start idle timer when video starts playing (if already hovering)
        player.on('play', () => {
            if (videoHero.classList.contains('cs-hover')) {
                clearTimeout(idleTimeout);
                idleTimeout = setTimeout(() => {
                    videoHero.classList.add('cs-idle');
                }, 1000);
            }
        });

        // Remove idle state when video pauses
        player.on('pause', () => {
            videoHero.classList.remove('cs-idle');
            clearTimeout(idleTimeout);
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !menuOverlay.classList.contains('active')) {
                e.preventDefault();
                togglePlay();
            }
            // Escape exits fullscreen (browser handles this natively, but just in case)
            if (e.key === 'Escape' && document.fullscreenElement) {
                document.exitFullscreen();
            }
        });

        // ==================== //
        // GRADIENT SPREAD EFFECT (case study link)
        // ==================== //
        document.querySelectorAll('.case-study-link').forEach(link => {
            link.setAttribute('data-text', link.textContent);

            let animationFrame;

            link.addEventListener('mouseenter', (e) => {
                const rect = link.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                link.style.setProperty('--mx', x + 'px');
                link.style.setProperty('--my', y + 'px');
                link.style.setProperty('--spread', '0%');

                let start = null;
                const duration = 1400;
                const animate = (timestamp) => {
                    if (!start) start = timestamp;
                    const progress = Math.min((timestamp - start) / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    link.style.setProperty('--spread', (eased * 200) + '%');
                    if (progress < 1) {
                        animationFrame = requestAnimationFrame(animate);
                    }
                };
                cancelAnimationFrame(animationFrame);
                animationFrame = requestAnimationFrame(animate);
            });

            link.addEventListener('mouseleave', () => {
                cancelAnimationFrame(animationFrame);
                const currentSpread = parseFloat(link.style.getPropertyValue('--spread')) || 200;

                let start = null;
                const duration = 700;
                const animate = (timestamp) => {
                    if (!start) start = timestamp;
                    const progress = Math.min((timestamp - start) / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    link.style.setProperty('--spread', (currentSpread * (1 - eased)) + '%');
                    if (progress < 1) {
                        animationFrame = requestAnimationFrame(animate);
                    }
                };
                animationFrame = requestAnimationFrame(animate);
            });
        });

        // ==================== //
        // VIRUS SPREADING TEXT EFFECT (footer)
        // ==================== //
        const virusLinks = document.querySelectorAll('.footer-link');

        virusLinks.forEach(link => {
            const text = link.textContent;
            link.textContent = '';

            const chars = [];
            for (let i = 0; i < text.length; i++) {
                const char = document.createElement('span');
                char.className = 'char';
                char.textContent = text[i] === ' ' ? '\u00A0' : text[i];
                link.appendChild(char);
                chars.push(char);
            }

            let isInfected = false;

            link.addEventListener('mouseenter', (e) => {
                if (isInfected) return;
                isInfected = true;

                const rect = link.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const charDistances = chars.map((char, index) => {
                    const charRect = char.getBoundingClientRect();
                    const charCenterX = charRect.left - rect.left + charRect.width / 2;
                    const charCenterY = charRect.top - rect.top + charRect.height / 2;
                    const distance = Math.sqrt(
                        Math.pow(charCenterX - mouseX, 2) +
                        Math.pow(charCenterY - mouseY, 2)
                    );
                    return { char, distance, index };
                });

                charDistances.sort((a, b) => a.distance - b.distance);

                charDistances.forEach((item, i) => {
                    setTimeout(() => {
                        item.char.classList.add('infected');
                    }, i * 30);
                });
            });

            link.addEventListener('mouseleave', (e) => {
                const rect = link.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const charDistances = chars.map((char, index) => {
                    const charRect = char.getBoundingClientRect();
                    const charCenterX = charRect.left - rect.left + charRect.width / 2;
                    const charCenterY = charRect.top - rect.top + charRect.height / 2;
                    const distance = Math.sqrt(
                        Math.pow(charCenterX - mouseX, 2) +
                        Math.pow(charCenterY - mouseY, 2)
                    );
                    return { char, distance, index };
                });

                charDistances.sort((a, b) => b.distance - a.distance);

                charDistances.forEach((item, i) => {
                    setTimeout(() => {
                        item.char.classList.remove('infected');
                        if (i === charDistances.length - 1) {
                            isInfected = false;
                        }
                    }, i * 25);
                });
            });
        });
    </script>

    <script>
        // ==================== //
        // DARK MODE TOGGLE
        // ==================== //
        (function() {
            const toggle = document.getElementById('darkModeToggle');
            const isDark = localStorage.getItem('darkMode') !== 'false';
            if (isDark) {
                document.body.classList.add('dark-mode');
                toggle.checked = true;
            }
            toggle.addEventListener('change', () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            });

            // Cursor inflate on toggle hover
            const cursorEl = document.getElementById('cursor');
            const toggleLabel = document.querySelector('.dark-mode-toggle');
            toggleLabel.addEventListener('mouseenter', () => {
                cursorEl.style.transform = 'translate(-50%, -50%) scale(1.8)';
                cursorEl.style.transition = 'transform 0.2s ease, left 0s, top 0s';
            });
            toggleLabel.addEventListener('mouseleave', () => {
                cursorEl.style.transform = 'translate(-50%, -50%) scale(1)';
                cursorEl.style.transition = 'transform 0.2s ease, left 0s, top 0s';
            });
        })();
    </script>

    <script>
    // Re-enforce cursor:none via injected stylesheet (bfcache-safe)
    (function() {
        function enforceNoCursor() {
            var existing = document.getElementById('no-native-cursor');
            if (existing) existing.remove();
            var style = document.createElement('style');
            style.id = 'no-native-cursor';
            style.textContent = 'html, html *, body, body * { cursor: none !important; }';
            document.head.appendChild(style);
        }
        enforceNoCursor();
        window.addEventListener('pageshow', function(e) {
            enforceNoCursor();
            var cursor = document.getElementById('cursor');
            if (cursor && !('ontouchstart' in window)) {
                cursor.style.display = 'block';
            }
        });
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) enforceNoCursor();
        });
    })();
    </script>
    <!-- Custom click cursor: knockout label box over clickable elements -->
    <script>
    (function(){
      try {
        if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return;
        var st = document.createElement('style');
        st.textContent = '#clickCursor{position:fixed;text-transform:uppercase;left:-200px;top:-200px;transform:translate(-50%,-50%) scale(.7);opacity:0;pointer-events:none;z-index:10050;mix-blend-mode:difference;transition:opacity .25s ease,transform .3s cubic-bezier(.2,.8,.2,1);will-change:transform,left,top,opacity}#clickCursor.show{opacity:1;transform:translate(-50%,-50%) scale(1)}body.click-cursor-active .cursor{opacity:0 !important}';
        document.head.appendChild(st);
        var box = document.createElement('div');
        box.id = 'clickCursor';
        box.setAttribute('aria-hidden','true');
        document.body.appendChild(box);
        function makeBox(label){
          var w = Math.max(56, Math.round(label.length * 8.6 + 28)), h = 26;
          return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg"><defs><mask id="clickCursorMask"><rect width="'+w+'" height="'+h+'" rx="5" fill="#fff"/><text x="'+(w/2)+'" y="14" text-anchor="middle" dominant-baseline="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="12" letter-spacing="-0.2" fill="#000">'+label+'</text></mask></defs><rect width="'+w+'" height="'+h+'" rx="5" fill="#fff" mask="url(#clickCursorMask)"/></svg>';
        }
        var current = '';
        function setLabel(l){ if (l === current) return; current = l; box.innerHTML = makeBox(l); }
        setLabel('CLICK');
        function menuOpen(){ return !!document.querySelector('.menu-overlay.active'); }
        function hide(){ box.classList.remove('show'); document.body.classList.remove('click-cursor-active'); }
        function show(el){
          if (menuOpen()) { hide(); return; }
          var lbl = (el.getAttribute && el.getAttribute('data-cursor')) || 'CLICK';
          setLabel(String(lbl).toUpperCase());
          box.classList.add('show');
          document.body.classList.add('click-cursor-active');
        }
        document.addEventListener('mousemove', function(e){
          box.style.left = e.clientX + 'px'; box.style.top = e.clientY + 'px';
          if (menuOpen() && box.classList.contains('show')) hide();
        }, {passive:true});
        var sel = 'a[href], button, label, input, select, textarea, summary, [role=button], [onclick], .cs-ctrl, .dark-mode-toggle, .logo-bottom, .project-client-link, [data-cursor]';
        function hit(t){ if (!t || !t.closest) return null; if (t.closest('.site-footer, .footer, .lab-footer')) return null; if (t.closest('.cs-video-controls') && !t.closest('.cs-ctrl')) return null; return t.closest(sel); }
        document.addEventListener('mouseover', function(e){ var el = hit(e.target); if (el) show(el); }, {passive:true});
        document.addEventListener('mouseout', function(e){ if (hit(e.target) && !hit(e.relatedTarget)) hide(); }, {passive:true});
      } catch(err){}
    })();
    </script>
