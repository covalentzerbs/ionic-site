    <style>
        @font-face {
            font-family: 'Satoshi';
            src: url('assets/fonts/Satoshi-Variable.ttf') format('truetype');
            font-weight: 300 900;
            font-display: swap;
        }

        /* CSS Variables */
        :root {
            --ice: #FAFBFC;
            --bond-blue: #5979e9;
            --black: #0A0A0A;
            --gray: #6B7280;
            --white: #FFFFFF;
        }

        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        ::selection {
            background: var(--black);
            color: var(--white);
            -webkit-text-fill-color: var(--white);
        }

        html, body {
            height: 100%;
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--white);
            pointer-events: none;
            z-index: 10001;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--white);
            color: var(--black);
            overflow-x: hidden;
            letter-spacing: -0.07em;
        }

        /* Navigation - Plus Menu */
        .nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 2rem;
            z-index: 10001;
        }

        .menu-toggle {
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-toggle.active {
            transform: rotate(45deg);
        }

        .plus-icon {
            width: 18px;
            height: 18px;
            position: relative;
        }

        .plus-icon span {
            display: block;
            position: absolute;
            width: 100%;
            height: 2px;
            background: #7c5cfc;
            top: 50%;
            left: 0;
            transition: all 0.3s ease;
        }

        .plus-icon span:first-child {
            transform: translateY(-50%) rotate(90deg);
        }

        .plus-icon span:last-child {
            transform: translateY(-50%);
        }

        /* Expanded Menu */
        .menu-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding: 3rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            pointer-events: auto;
            opacity: 1;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.3);
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .menu-link {
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 500;
            color: var(--white);
            text-decoration: none;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.07em;
            line-height: 1.05;
        }

        .menu-overlay.active .menu-link {
            opacity: 0.6;
            transform: translateX(0);
        }

        .menu-overlay.active .menu-link:nth-child(1) { transition-delay: 0.05s; }
        .menu-overlay.active .menu-link:nth-child(2) { transition-delay: 0.1s; }
        .menu-overlay.active .menu-link:nth-child(3) { transition-delay: 0.15s; }
        .menu-overlay.active .menu-link:nth-child(4) { transition-delay: 0.25s; }
        .menu-overlay.active .menu-link:nth-child(5) { transition-delay: 0.3s; }

        
        .menu-spacer {
            height: 0.8em;
        }

        .menu-socials {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-top: 1.5rem;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-overlay.active .menu-socials {
            opacity: 0.5;
            transform: translateX(0);
            transition-delay: 0.3s;
        }

        .menu-link-lab {
            color: #A6FF8E;
        }

        .menu-overlay.active .menu-link-lab {
            opacity: 0.5 !important;
            transition: opacity 0.12s ease !important;
        }

        .menu-overlay.active .menu-link-lab:hover {
            opacity: 1 !important;
            transition: opacity 0.12s ease !important;
        }

        .menu-link-bond {
            font-family: 'Satoshi', sans-serif;
            font-weight: 500;
            letter-spacing: -0.03em;
            color: var(--bond-blue);
                    text-transform: none;
        }

        .menu-link:hover {
            opacity: 1 !important;
        }

        .menu-link {
            position: relative;
            display: inline-block;
        }

        .menu-link.current {
            opacity: 1 !important;
        }

        /* Content Area (contains everything except footer) */
        .content-area {
            flex: 1;
            position: relative;
        }

        /* Logo Bottom Right */
        .logo-bottom {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.3s ease;
            pointer-events: auto;
        }

        .logo-bottom svg {
            width: 40px;
            height: 40px;
        }

        /* Directors Page */
        .directors-page {
            min-height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: var(--black);
        }

        .video-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scale(1.33);
            transform-origin: center center;
            border: none;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }

        .video-wrapper iframe.widescreen {
            transform: scale(1.12);
        }

        .video-wrapper iframe.zoom-slight {
            transform: scale(1.15);
        }

        .video-wrapper iframe.active {
            opacity: 1;
        }

        .video-wrapper .director-poster {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0; pointer-events: none; z-index: 1;
            transition: opacity 0.15s ease;
            filter: blur(14px);
            transform: scale(1.08);
        }

        .video-cursor-block {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: auto;
            cursor: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAABGdBTUEAALGPC/xhBQAAAA1JREFUGFdj+P///38ACfsD/QjR0NMAAAAASUVORK5CYII=') 0 0, none;
        }

        /* Directors List */
        .directors-list {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 2.5rem 3.5rem;
        }

        .directors-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0;
        }

        /* Director Row */
        .director-row {
            cursor: pointer;
            padding: 0;
            margin: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .director-name {
            font-size: clamp(3rem, 9vw, 8rem);
            font-weight: 500;
            line-height: 1.0;
            color: var(--white);
            /* No transition on base — hover-off snaps instantly, no white flash */
            transition: none;
            opacity: 0.65;
            letter-spacing: -0.07em;
            text-transform: lowercase;
        }

        /* Only CSS :hover controls the blue highlight — no .active class here.
           Keeps exactly one name highlighted at a time, no lingering state. */
        /* Light mode: hover just brightens the name to full-opacity white (subtle). */
        .director-row:hover .director-name {
            /* Transition only applies on hover-in (CSS one-way transition) */
            transition: opacity 0.2s ease;
            opacity: 1;
            background: none;
            -webkit-background-clip: border-box;
            background-clip: border-box;
            -webkit-text-fill-color: var(--white);
            color: var(--white);
            animation: none;
        }

        /* No Video State */
        /* Idle state - cursor stopped moving */
        .directors-container.idle .director-name {
            opacity: 0 !important;
            -webkit-text-fill-color: transparent;
        }

        .director-row.no-video .director-name {
            opacity: 0.15;
        }

        .director-row.no-video:hover .director-name {
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .nav {
                padding: 1.5rem;
            }

            .logo-bottom {
                top: 1.5rem;
                left: 1.5rem;
            }

            .directors-list {
                padding: 2rem 2.5rem;
            }

            .menu-overlay {
                padding: 6rem 2.5rem 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .nav {
                padding: 1.5rem 1.5rem;
            }

            .logo-bottom {
                top: 1.5rem;
                left: 1.5rem;
            }

            .logo-bottom svg {
                width: 32px;
                height: 32px;
            }

            .directors-list {
                padding: 1.5rem 1.5rem;
            }

            .director-row {
                margin: 0.2em 0;
            }

            .menu-overlay {
                padding: 5rem 1.5rem 1.5rem;
            }

            /* Cursor block not needed on touch — remove so it can't block taps */
            .video-cursor-block {
                pointer-events: none;
            }

            /* Full-bleed video fix for portrait mobile — same as home.html */
            .video-background {
                overflow: hidden;
            }
            .video-wrapper iframe {
                width: 177.78dvh !important;
                height: 100dvh !important;
                top: 50% !important;
                left: 50% !important;
                transform: translate(-50%, -50%) !important;
            }
        }
        /* ==================== */
        /* FOOTER */
        /* ==================== */
        .site-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
            opacity: 1;
        }
        .site-footer-left {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--white);
            opacity: 0.5;
        }
        .site-footer-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            opacity: 0.5;
        }
        .site-footer-socials {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .social-link {
            color: var(--white);
            display: flex;
            align-items: center;
        }
        /* ==================== */
        /* DARK MODE OVERRIDES */
        /* ==================== */
        body.dark-mode {
            background-color: #1A1A2E !important;
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode ::selection {
            background: #7c5cfc !important;
            color: #1A1A2E !important;
            -webkit-text-fill-color: #1A1A2E !important;
        }

        body.dark-mode .cursor {
            background: #7c5cfc !important;
        }

        body.dark-mode .plus-icon span {
            background: #7c5cfc !important;
        }

        body.dark-mode .menu-link {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }
        body.dark-mode .menu-link-lab { color: #A6FF8E !important; -webkit-text-fill-color: #A6FF8E; }
        body.dark-mode .menu-link-bond { color: var(--bond-blue) !important; -webkit-text-fill-color: var(--bond-blue); }

        body.dark-mode .logo-bottom svg path {
            fill: #7c5cfc !important;
        }

        body.dark-mode .footer {
            background: #1A1A2E !important;
        }

        body.dark-mode .footer-left,
        body.dark-mode .footer-link,
        body.dark-mode .footer-link .char {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode .footer-link::after {
            background: #7c5cfc !important;
        }

        body.dark-mode .social-link { color: #7c5cfc !important; }
        body.dark-mode .site-footer-left { color: #7c5cfc !important; -webkit-text-fill-color: #7c5cfc; }

        body.dark-mode .contact-email {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode .clock-row {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode .about-text {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode .project-client {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode .project-subtitle {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode .scroll-progress-segment {
            background: #7c5cfc !important;
        }

        body.dark-mode .director-name {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        /* Dark mode: hover deepens to a darker purple. */
        body.dark-mode .director-row:hover .director-name {
            color: #6d28d9 !important;
            -webkit-text-fill-color: #6d28d9 !important;
        }

        body.dark-mode .director-credit {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode .case-study-link {
            color: #7c5cfc !important;
            -webkit-text-fill-color: #7c5cfc;
        }

        body.dark-mode .case-study-link::after {
            background: #7c5cfc !important;
        }

        body.dark-mode .hero-logo svg path {
            fill: #7c5cfc !important;
        }

        /* ==================== */
        /* DARK MODE TOGGLE */
        /* ==================== */
        .dark-mode-toggle {
            cursor: none;
        }

        .dark-mode-toggle input {
            display: none;
        }

        .toggle-track {
            width: 28px;
            height: 16px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            position: relative;
            transition: background 0.3s ease;
            cursor: none;
            display: block;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 12px;
            height: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode-toggle input:checked + .toggle-track {
            background: rgba(124, 92, 252, 0.8);
        }

        .dark-mode-toggle input:checked + .toggle-track::after {
            transform: translateX(12px);
            background: #7c5cfc;
        }
        /* SOCIAL ICON BRAND HOVER */
        /* SOCIAL ICON BRAND HOVER — high-saturation feedback */
        .social-link {
            transition: color 0.18s ease, opacity 0.18s ease, transform 0.18s ease, filter 0.18s ease;
            transform-origin: center;
        }
        .social-link[aria-label="Instagram"]:hover {
            color: #E1306C !important;
            opacity: 1 !important;
            transform: scale(1.22);
            filter: drop-shadow(0 0 10px rgba(225, 48, 108, 0.55)) saturate(1.4);
        }
        .social-link[aria-label="LinkedIn"]:hover {
            color: #0A66C2 !important;
            opacity: 1 !important;
            transform: scale(1.22);
            filter: drop-shadow(0 0 10px rgba(10, 102, 194, 0.6)) saturate(1.4);
        }
        .social-link.social-link-ionic:hover {
            color: #714BDD !important;
            opacity: 1 !important;
            transform: scale(1.22);
            filter: drop-shadow(0 0 10px rgba(113, 75, 221, 0.6)) saturate(1.4);
        }
        /* Lift the muted .menu-socials row so the hovered icon shows full color */
        .menu-overlay.active .menu-socials:hover { opacity: 1 !important; }
        /* BRANDED SCROLLBAR — replaces the native macOS overlay scrollbar
           with a thin Bond-Blue line on the right edge of the page. */
        html {
            scrollbar-width: thin;
            scrollbar-color: rgba(89, 121, 233, 0.45) transparent;
        }
        html::-webkit-scrollbar {
            width: 6px;
        }
        html::-webkit-scrollbar-track {
            background: transparent;
        }
        html::-webkit-scrollbar-thumb {
            background: rgba(89, 121, 233, 0.35);
            border-radius: 3px;
            border: 1px solid transparent;
            background-clip: padding-box;
            transition: background-color 0.2s ease;
        }
        html::-webkit-scrollbar-thumb:hover {
            background: var(--bond-blue, #5979e9);
        }

        /* Dark mode: paint the root element so the canvas stays dark while
           scrolling. body height:100% means its background does not reach the
           canvas once the page scrolls, leaving the root white. */
        html:has(body.dark-mode) {
            background-color: #1A1A2E;
        }





        /* Footer link inherits footer colour (kills default visited-link purple) */
        .footer-link, .footer-link:link, .footer-link:visited { color: inherit; }
    </style>

    <script>
        // Editors data
        const directors = [
            { id: 'jacob',    slug: 'jacob-frost',          name: 'Jacob Frost',         vimeo: '1170741864', zoom: 'slight',    thumbnail: 'https://i.vimeocdn.com/video/2129989125-7bcea3f611dc90b29683cb79b07503543d01abd6db34091368cc53005941e0e5-d_1280x720' },
            { id: 'jude',     slug: 'jude-gabriel-nelson',  name: 'Jude Gabriel Nelson', vimeo: '1205656125', thumbnail: 'https://i.vimeocdn.com/video/2174299129-d1d679767ddd2f9680146440e930784ffd0c3404851d06e85c767085329876b5-d_1280x720' },
            { id: 'bella',    slug: 'bella-latenser',       name: 'Bella Latenser',      vimeo: '1194480262', thumbnail: 'https://i.vimeocdn.com/video/2160142585-915e5a834ef46a2237b6973ef5947e3c9218f2348b1d435e3fd36142ecd6430b-d_1280x720' },
            { id: 'joey',     slug: 'joey-doyle',           name: 'Joey Doyle',          vimeo: '1208486080', hash: '0dae002bb7', thumbnail: 'https://i.vimeocdn.com/video/2177818749-19d5c96d52c85ee4f931d08ed41a8ba0c0d26ab8489d03ccba91bdc89e4d403f-d_1280x720' }
        ];

        const videoWrapper = document.getElementById('videoWrapper');
        const directorRows = document.querySelectorAll('.director-row');
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');

        // Mark directors without video
        directorRows.forEach(row => {
            const directorId = row.getAttribute('data-director');
            const director = directors.find(d => d.id === directorId);
            if (!director || (!director.vimeo && !director.youtube)) {
                row.classList.add('no-video');
            }
        });

        // Create video iframes lazily — only the first one upfront, others on demand
        function createVideoElement(director) {
            const iframe = document.createElement('iframe');
            iframe.setAttribute('data-director', director.id);
            iframe.setAttribute('frameborder', '0');
            iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
            iframe.setAttribute('allowfullscreen', '');
            iframe.setAttribute('loading', 'eager');

            if (director.vimeo) {
                iframe.src = `https://player.vimeo.com/video/${director.vimeo}?${director.hash ? 'h=' + director.hash + '&' : ''}badge=0&autopause=0&player_id=0&app_id=58479&autoplay=1&loop=1&muted=1&controls=0&background=1&dnt=1`;
            } else if (director.youtube) {
                iframe.src = `https://www.youtube.com/embed/${director.youtube}?autoplay=1&loop=1&muted=1&controls=0&showinfo=0&rel=0&modestbranding=1&playlist=${director.youtube}&playsinline=1`;
            }

            if (director.zoom) {
                iframe.classList.add('zoom-' + director.zoom);
            } else if (director.widescreen) {
                iframe.classList.add('widescreen');
            }

            return iframe;
        }

        // Ensure an iframe exists for a given director — creates lazily, returns the iframe
        function ensureVideo(directorId) {
            let iframe = videoWrapper.querySelector(`iframe[data-director="${directorId}"]`);
            if (iframe) return iframe;
            const director = directors.find(d => d.id === directorId);
            if (!director || (!director.vimeo && !director.youtube)) return null;
            iframe = createVideoElement(director);
            videoWrapper.appendChild(iframe);
            return iframe;
        }

        // Load all director videos immediately so hover switches are instant
        directors.forEach(d => {
            if (d.vimeo || d.youtube) ensureVideo(d.id);
        });

        // Create poster thumbnails synchronously from hardcoded URLs
        let posterTimer = null;
        directors.forEach(d => {
            if (!d.thumbnail) return;
            const img = document.createElement('img');
            img.className = 'director-poster';
            img.setAttribute('data-director', d.id);
            img.src = d.thumbnail;
            img.width = 1280; img.height = 720; img.alt = '';
            videoWrapper.appendChild(img);
        });

        // Switch video with crossfade
        let currentVideoId = null;
        let switchTimer = null;

        function switchVideo(directorId) {
            const director = directors.find(d => d.id === directorId);

            if (!director || (!director.vimeo && !director.youtube)) {
                return;
            }

            if (directorId === currentVideoId) return;

            currentVideoId = directorId;

            // Lazy-create the iframe on first hover (after that it's cached in the DOM)
            const newIframe = ensureVideo(directorId);

            // Show poster immediately to cover black frames while video loads
            clearTimeout(posterTimer);
            videoWrapper.querySelectorAll('.director-poster').forEach(p => {
                p.style.transition = 'opacity 0.3s ease';
                p.style.opacity = '0';
            });
            const newPoster = videoWrapper.querySelector(`.director-poster[data-director="${directorId}"]`);
            if (newPoster) {
                newPoster.style.transition = 'opacity 0.15s ease';
                newPoster.style.opacity = '1';
                posterTimer = setTimeout(() => {
                    newPoster.style.transition = 'opacity 0.8s ease';
                    newPoster.style.opacity = '0';
                }, 1500);
            }

            // True crossfade: remove active from all, add to new one simultaneously
            // CSS transition handles the fade — no black gap
            const iframes = videoWrapper.querySelectorAll('iframe');
            iframes.forEach(iframe => iframe.classList.remove('active'));
            if (newIframe) {
                newIframe.classList.add('active');
            }

            directorRows.forEach(row => row.classList.remove('active'));
            const activeRow = document.querySelector(`.director-row[data-director="${directorId}"]`);
            if (activeRow) {
                activeRow.classList.add('active');
            }
        }

        // Hover and click listeners with debounce
        directorRows.forEach(row => {
            // Touch: tap to switch video (mouseenter doesn't fire on mobile)
            row.addEventListener('touchstart', (e) => {
                const directorId = row.getAttribute('data-director');
                switchVideo(directorId);
            }, { passive: true });

            row.addEventListener('mouseenter', () => {
                const directorId = row.getAttribute('data-director');
                clearTimeout(switchTimer);
                switchTimer = setTimeout(() => {
                    switchVideo(directorId);
                }, 50);
            });

            row.addEventListener('mouseleave', () => {
                clearTimeout(switchTimer);
            });

            row.addEventListener('click', () => {
                const directorId = row.getAttribute('data-director');
                const director = directors.find(d => d.id === directorId);

                if (director) {
                    window.location.href = '/editors/' + director.id;
                }
            });
        });

        // Set initial video immediately
        const firstDirectorWithVideo = directors.find(d => d.vimeo || d.youtube);
        if (firstDirectorWithVideo) {
            switchVideo(firstDirectorWithVideo.id);
        }

        // Menu toggle
        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            menuOverlay.classList.toggle('active');
        });

        // Close menu when clicking outside
        menuOverlay.addEventListener('click', (e) => {
            if (e.target === menuOverlay) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        // Close menu on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        // ==================== //
        // MENU LINK GRADIENT SPREAD EFFECT
        // ==================== //
        // (menu hover handled by CSS only)

        // Custom cursor + idle detection
        const cursor = document.getElementById('cursor');
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            cursor.style.display = 'none';
        }
        const directorsContainer = document.querySelector('.directors-container');
        let idleTimer;
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // Show text on mouse move
            directorsContainer.classList.remove('idle');

            // Reset idle timer
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                directorsContainer.classList.add('idle');
            }, 3000);
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.35;
            cursorY += (mouseY - cursorY) * 0.35;
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // ==================== //
        // VIRUS SPREADING TEXT EFFECT (footer)
        // ==================== //
        const virusLinks = document.querySelectorAll('.footer-link');

        virusLinks.forEach(link => {
            const text = link.textContent;
            link.textContent = '';

            const chars = [];
            for (let i = 0; i < text.length; i++) {
                const char = document.createElement('span');
                char.className = 'char';
                char.textContent = text[i] === ' ' ? '\u00A0' : text[i];
                link.appendChild(char);
                chars.push(char);
            }

            let isInfected = false;

            link.addEventListener('mouseenter', (e) => {
                if (isInfected) return;
                isInfected = true;

                const rect = link.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const charDistances = chars.map((char, index) => {
                    const charRect = char.getBoundingClientRect();
                    const charCenterX = charRect.left - rect.left + charRect.width / 2;
                    const charCenterY = charRect.top - rect.top + charRect.height / 2;
                    const distance = Math.sqrt(
                        Math.pow(charCenterX - mouseX, 2) +
                        Math.pow(charCenterY - mouseY, 2)
                    );
                    return { char, distance, index };
                });

                charDistances.sort((a, b) => a.distance - b.distance);

                charDistances.forEach((item, i) => {
                    setTimeout(() => {
                        item.char.classList.add('infected');
                        if (i === charDistances.length - 1) {
                            link.classList.add('fully-infected');
                        }
                    }, i * 30);
                });
            });

            link.addEventListener('mouseleave', (e) => {
                const rect = link.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const charDistances = chars.map((char, index) => {
                    const charRect = char.getBoundingClientRect();
                    const charCenterX = charRect.left - rect.left + charRect.width / 2;
                    const charCenterY = charRect.top - rect.top + charRect.height / 2;
                    const distance = Math.sqrt(
                        Math.pow(charCenterX - mouseX, 2) +
                        Math.pow(charCenterY - mouseY, 2)
                    );
                    return { char, distance, index };
                });

                charDistances.sort((a, b) => b.distance - a.distance);
                link.classList.remove('fully-infected');

                charDistances.forEach((item, i) => {
                    setTimeout(() => {
                        item.char.classList.remove('infected');
                        if (i === charDistances.length - 1) {
                            isInfected = false;
                        }
                    }, i * 25);
                });
            });
        });
    </script>

    <script>
        // ==================== //
        // DARK MODE TOGGLE

        (function() {
            const toggle = document.getElementById('darkModeToggle');
            const isDark = localStorage.getItem('darkMode') !== 'false';
            if (isDark) {
                document.body.classList.add('dark-mode');
                toggle.checked = true;
            }
            toggle.addEventListener('change', () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            });

        })();
    </script>

    <script>
    // Re-enforce cursor:none via injected stylesheet (bfcache-safe)
    (function() {
        function enforceNoCursor() {
            var existing = document.getElementById('no-native-cursor');
            if (existing) existing.remove();
            var style = document.createElement('style');
            style.id = 'no-native-cursor';
            style.textContent = 'html, html *, body, body * { cursor: none !important; }';
            document.head.appendChild(style);
        }
        enforceNoCursor();
        window.addEventListener('pageshow', function(e) {
            enforceNoCursor();
            var cursor = document.getElementById('cursor');
            if (cursor && !('ontouchstart' in window)) {
                cursor.style.display = 'block';
            }
        });
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) enforceNoCursor();
        });
    })();
    </script>
    <!-- Custom click cursor: knockout label box over clickable elements -->
    <script>
    (function(){
      try {
        if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return;
        var st = document.createElement('style');
        st.textContent = '#clickCursor{position:fixed;text-transform:uppercase;left:-200px;top:-200px;transform:translate(-50%,-50%) scale(.7);opacity:0;pointer-events:none;z-index:10050;mix-blend-mode:difference;transition:opacity .25s ease,transform .3s cubic-bezier(.2,.8,.2,1);will-change:transform,left,top,opacity}#clickCursor.show{opacity:1;transform:translate(-50%,-50%) scale(1)}body.click-cursor-active .cursor{opacity:0 !important}';
        document.head.appendChild(st);
        var box = document.createElement('div');
        box.id = 'clickCursor';
        box.setAttribute('aria-hidden','true');
        document.body.appendChild(box);
        function makeBox(label){
          var w = Math.max(56, Math.round(label.length * 8.6 + 28)), h = 26;
          return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg"><defs><mask id="clickCursorMask"><rect width="'+w+'" height="'+h+'" rx="5" fill="#fff"/><text x="'+(w/2)+'" y="14" text-anchor="middle" dominant-baseline="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="12" letter-spacing="-0.2" fill="#000">'+label+'</text></mask></defs><rect width="'+w+'" height="'+h+'" rx="5" fill="#fff" mask="url(#clickCursorMask)"/></svg>';
        }
        var current = '';
        function setLabel(l){ if (l === current) return; current = l; box.innerHTML = makeBox(l); }
        setLabel('CLICK');
        function menuOpen(){ return !!document.querySelector('.menu-overlay.active'); }
        function hide(){ box.classList.remove('show'); document.body.classList.remove('click-cursor-active'); }
        function show(el){
          if (menuOpen()) { hide(); return; }
          var lbl = (el.getAttribute && el.getAttribute('data-cursor')) || 'CLICK';
          setLabel(String(lbl).toUpperCase());
          box.classList.add('show');
          document.body.classList.add('click-cursor-active');
        }
        document.addEventListener('mousemove', function(e){
          box.style.left = e.clientX + 'px'; box.style.top = e.clientY + 'px';
          if (menuOpen() && box.classList.contains('show')) hide();
        }, {passive:true});
        var sel = 'a[href], button, label, input, select, textarea, summary, [role=button], [onclick], .cs-ctrl, .dark-mode-toggle, .logo-bottom, .project-client-link, [data-cursor]';
        function hit(t){ if (!t || !t.closest) return null; if (t.closest('.site-footer, .footer, .lab-footer')) return null; if (t.closest('.cs-video-controls') && !t.closest('.cs-ctrl')) return null; return t.closest(sel); }
        document.addEventListener('mouseover', function(e){ var el = hit(e.target); if (el) show(el); }, {passive:true});
        document.addEventListener('mouseout', function(e){ if (hit(e.target) && !hit(e.relatedTarget)) hide(); }, {passive:true});
      } catch(err){}
    })();
    </script>
